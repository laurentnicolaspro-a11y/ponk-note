<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ponk Note — Résultats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
    :root {
      --grad: linear-gradient(145deg, #d8f0e8 0%, #c8e8f0 40%, #d8eef8 100%);
      --glass: rgba(255,255,255,0.5);
      --glass-border: rgba(255,255,255,0.75);
      --text: #2a2a3a;
      --muted: rgba(42,42,58,0.5);
      --accent: #4a7fd4;
      --danger: #e05555;
      --green: #3db87a;
      --surface: rgba(255,255,255,0.55);
    }
    html, body { min-height:100%; font-family:'Inter',-apple-system,sans-serif; color:var(--text); }
    body { background:var(--grad); padding-bottom:40px; }
    body::before { content:''; position:fixed; inset:0; z-index:-1; background:var(--grad); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Header */
    header {
      position:sticky; top:0; z-index:10;
      backdrop-filter:blur(24px) saturate(180%);
      -webkit-backdrop-filter:blur(24px) saturate(180%);
      background:rgba(200,235,220,0.7);
      border-bottom:1px solid var(--glass-border);
      padding:env(safe-area-inset-top,0px) 20px 0;
    }
    .header-inner {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 0; max-width:430px; margin:0 auto;
    }
    .logo { font-size:17px; font-weight:700; letter-spacing:-0.3px; color:var(--text); }
    .logo span { color:var(--muted); font-weight:400; }
    .header-right { display:flex; align-items:center; gap:10px; }
    .back-btn {
      background:var(--glass); border:1.5px solid var(--glass-border);
      backdrop-filter:blur(12px); color:var(--accent); padding:6px 14px;
      border-radius:100px; font-family:inherit; font-size:13px; font-weight:500;
      cursor:pointer; -webkit-tap-highlight-color:transparent;
    }
    .back-btn:active { background:rgba(255,255,255,0.7); }
    .header-avatar {
      width:32px; height:32px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:600; color:#fff;
      box-shadow:0 2px 8px rgba(0,0,0,0.15);
    }

    .content { max-width:430px; margin:0 auto; padding:20px 20px 0; display:flex; flex-direction:column; gap:10px; }
    .meta { font-size:13px; color:var(--muted); padding:0 4px; }

    /* Cards */
    .card {
      background:var(--glass); border:1.5px solid var(--glass-border);
      backdrop-filter:blur(20px); border-radius:18px; overflow:hidden;
    }
    .card-hd {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 16px; cursor:pointer;
      -webkit-tap-highlight-color:transparent; user-select:none;
    }
    .card-hd:active { background:rgba(255,255,255,0.3); }
    .card-lbl { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--muted); }
    .card-controls { display:flex; align-items:center; gap:8px; }
    .chevron { color:var(--muted); font-size:11px; transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1); }
    .chevron.closed { transform:rotate(-90deg); }
    .card-bd { border-top:1px solid rgba(255,255,255,0.5); padding:0 16px 16px; }
    .card-bd.hidden { display:none; }

    .sec { padding-top:14px; }
    .sec + .sec { margin-top:10px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.4); }
    .sec-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--muted); margin-bottom:8px; }
    .sec p { font-size:15px; line-height:1.65; color:var(--text); }

    ul.items { list-style:none; display:flex; flex-direction:column; gap:6px; padding-top:4px; }
    ul.items li {
      padding:10px 14px; background:rgba(255,255,255,0.4); border:1px solid rgba(255,255,255,0.6);
      border-radius:10px; font-size:14px; line-height:1.5;
      display:flex; gap:10px; color:var(--text);
    }
    ul.items li::before { content:'—'; color:var(--muted); flex-shrink:0; }

    ul.checks { list-style:none; display:flex; flex-direction:column; gap:6px; padding-top:4px; }
    ul.checks li {
      padding:10px 14px; background:rgba(255,255,255,0.4); border:1px solid rgba(255,255,255,0.6);
      border-radius:10px; font-size:14px;
      display:flex; align-items:center; gap:12px;
      cursor:pointer; -webkit-tap-highlight-color:transparent; transition:opacity 0.2s;
    }
    ul.checks li.done { opacity:.4; text-decoration:line-through; }
    .cb { width:20px; height:20px; border-radius:50%; flex-shrink:0; border:1.5px solid rgba(255,255,255,0.8); background:rgba(255,255,255,0.5); display:flex; align-items:center; justify-content:center; font-size:11px; transition:all 0.15s; }
    ul.checks li.done .cb { background:var(--green); border-color:var(--green); color:#fff; }

    table { width:100%; margin-top:8px; border-collapse:collapse; }
    td { padding:9px 0; font-size:14px; border-bottom:1px solid rgba(255,255,255,0.4); }
    td:last-child { text-align:right; }
    tr:last-child td { border-bottom:none; font-weight:600; }

    .transcript-text { font-size:13px; line-height:1.85; color:var(--muted); padding-top:14px; white-space:pre-wrap; font-family:monospace; }

    .action-btns { padding:16px 0 0; display:flex; flex-direction:column; gap:8px; }
    .btn-action {
      width:100%; padding:15px; border-radius:14px; border:none;
      font-family:inherit; font-size:16px; font-weight:600;
      cursor:pointer; -webkit-tap-highlight-color:transparent;
      transition:opacity 0.15s, transform 0.1s;
    }
    .btn-action:active { opacity:0.85; transform:scale(0.98); }
    .btn-action:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
    .btn-email { background:var(--accent); color:#fff; box-shadow:0 4px 16px rgba(74,127,212,0.3); }
    .btn-pdf { background:var(--glass); color:var(--text); border:1.5px solid var(--glass-border); }

    /* Audio player */
    .audio-player { padding-top:14px; display:flex; flex-direction:column; gap:10px; }
    .player-controls { display:flex; align-items:center; gap:12px; }
    .play-btn {
      width:40px; height:40px; border-radius:50%; flex-shrink:0;
      background:var(--accent); border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 4px 12px rgba(74,127,212,0.3);
      transition:transform 0.1s; -webkit-tap-highlight-color:transparent;
    }
    .play-btn:active { transform:scale(0.93); }
    .play-btn svg { fill:white; }
    .progress-wrap { flex:1; display:flex; flex-direction:column; gap:4px; }
    .progress-bar {
      width:100%; height:4px; border-radius:2px;
      background:rgba(255,255,255,0.4); cursor:pointer; position:relative; overflow:hidden;
    }
    .progress-fill { height:100%; border-radius:2px; background:var(--accent); width:0%; transition:width 0.1s linear; pointer-events:none; }
    .progress-times { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums; }

    /* Actions IA */
    .actions-ia-wrap { display:flex; flex-direction:column; gap:8px; }
    .action-ia-card {
      display:flex; align-items:center; gap:14px;
      background:var(--glass); border:1.5px solid var(--glass-border);
      backdrop-filter:blur(20px); border-radius:16px;
      padding:14px 16px; cursor:pointer;
      -webkit-tap-highlight-color:transparent; transition:background 0.15s;
      text-decoration:none; color:var(--text);
    }
    .action-ia-card:active { background:rgba(255,255,255,0.7); }
    .action-ia-icon {
      width:42px; height:42px; border-radius:12px;
      background:rgba(255,255,255,0.6); border:1px solid rgba(255,255,255,0.8);
      display:flex; align-items:center; justify-content:center;
      font-size:20px; flex-shrink:0;
    }
    .action-ia-info { flex:1; }
    .action-ia-titre { font-size:14px; font-weight:600; color:var(--text); margin-bottom:3px; }
    .action-ia-desc { font-size:12px; color:var(--muted); }
    .action-ia-arrow {
      width:28px; height:28px; border-radius:50%;
      background:var(--accent); display:flex; align-items:center; justify-content:center;
      flex-shrink:0; box-shadow:0 2px 8px rgba(74,127,212,0.3);
    }
    .action-ia-arrow svg { fill:white; }

    /* Deep analysis */
    .analysis-result {
      margin-top:12px; padding:14px;
      background:rgba(255,255,255,0.4); border-radius:12px;
      border:1px solid rgba(255,255,255,0.6);
      font-size:13px; line-height:1.7; color:var(--text); display:none;
    }
    .analysis-result.visible { display:block; animation:fadeUp 0.3s ease; }
    .analysis-loading { display:none; align-items:center; gap:8px; margin-top:10px; font-size:12px; color:var(--muted); }
    .analysis-loading.visible { display:flex; }
    .analysis-spinner { width:14px; height:14px; border-radius:50%; border:2px solid rgba(74,127,212,0.2); border-top-color:var(--accent); animation:spin 0.8s linear infinite; }

    .copy-btn {
      background:rgba(255,255,255,0.4); border:1px solid rgba(255,255,255,0.6);
      color:var(--muted); padding:5px 12px; border-radius:100px;
      font-size:12px; font-family:inherit; cursor:pointer;
    }
    .copy-btn:active { background:rgba(255,255,255,0.7); }

    /* ── Synthèse structurée ── */
    .summary-contexte {
      font-size:13px; color:var(--muted); line-height:1.5;
      padding:10px 12px; background:rgba(255,255,255,0.35);
      border-radius:10px; margin-top:14px;
    }

    .summary-section { padding-top:14px; }
    .summary-section + .summary-section { margin-top:8px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.4); }
    .summary-section-title {
      font-size:10px; font-weight:700; text-transform:uppercase;
      letter-spacing:0.8px; color:var(--muted); margin-bottom:8px;
      display:flex; align-items:center; gap:5px;
    }

    /* Points discutés */
    .points-list { display:flex; flex-direction:column; gap:5px; }
    .point-item {
      display:flex; align-items:flex-start; gap:8px;
      font-size:14px; color:var(--text); line-height:1.4;
      padding:8px 12px; background:rgba(255,255,255,0.35);
      border-radius:8px;
    }
    .point-item::before { content:'—'; color:var(--muted); flex-shrink:0; font-size:12px; margin-top:1px; }

    /* Décisions */
    .decisions-list { display:flex; flex-direction:column; gap:5px; }
    .decision-item {
      display:flex; align-items:flex-start; gap:8px;
      font-size:14px; color:var(--text); line-height:1.4;
      padding:8px 12px;
      background:rgba(61,184,122,0.08);
      border:1px solid rgba(61,184,122,0.2);
      border-radius:8px;
    }
    .decision-dot {
      width:8px; height:8px; border-radius:50%;
      background:var(--green); flex-shrink:0; margin-top:4px;
    }

    /* Actions tableau */
    .actions-table { width:100%; border-collapse:collapse; margin-top:4px; }
    .actions-table th {
      font-size:10px; font-weight:700; text-transform:uppercase;
      letter-spacing:0.6px; color:var(--muted);
      padding:6px 8px; text-align:left;
      border-bottom:1px solid rgba(255,255,255,0.5);
    }
    .actions-table td {
      padding:8px 8px; font-size:13px; color:var(--text);
      border-bottom:1px solid rgba(255,255,255,0.3);
      vertical-align:top; text-align:left;
    }
    .actions-table tr:last-child td { border-bottom:none; }
    .actions-table tr:nth-child(even) td { background:rgba(255,255,255,0.2); }
    .qui-badge {
      display:inline-block; padding:2px 8px; border-radius:100px;
      background:rgba(74,127,212,0.12); color:var(--accent);
      font-size:12px; font-weight:600; white-space:nowrap;
    }
    .quand-badge {
      display:inline-block; padding:2px 8px; border-radius:100px;
      background:rgba(224,122,48,0.1); color:#c06020;
      font-size:11px; font-weight:500; white-space:nowrap;
    }
    .indefini { color:var(--muted); font-size:12px; font-style:italic; }

    /* Prochaine étape */
    .prochaine-wrap {
      display:flex; align-items:center; gap:10px;
      padding:10px 14px;
      background:rgba(74,127,212,0.08);
      border:1px solid rgba(74,127,212,0.2);
      border-radius:10px; margin-top:4px;
    }
    .prochaine-icon { font-size:18px; flex-shrink:0; }
    .prochaine-text { font-size:14px; color:var(--text); line-height:1.4; }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <span class="logo">Ponk <span>Note</span></span>
    <div class="header-right">
      <button class="back-btn" onclick="window.location.href='/'">+ Nouveau</button>
      <div class="header-avatar" id="headerAvatar"></div>
    </div>
  </div>
</header>

<div class="content">
  <div id="meta" class="meta"></div>
  <div id="cards"></div>
  <div class="action-btns">
    <button class="btn-action btn-email" id="emailBtn" onclick="sendByEmail()">✉ Envoyer par email</button>
    <button class="btn-action btn-pdf" onclick="exportPDF()">↓ Exporter en PDF</button>
  </div>
</div>

<script>
const ACTION_REGISTRY = {}; // stocke url par actionId

const LABELS = {
  REUNION:'🏢 Réunion', COURSES:'🛒 Courses', CHANTIER:'🔨 Chantier',
  IDEES:'💡 Idées', DEPLACEMENT:'📍 Déplacement', FINANCE:'💰 Finance',
  APPEL:'📞 Appel', MEDICAL:'🏥 Médical', COURS:'🎓 Cours', MEMO:'📝 Mémo'
};
let audioEl = null;
let analyseCardCounter = 0;

const profile = localStorage.getItem('ponk_profile');
if (profile) {
  const COLORS = ['#4a7fd4','#e05555','#3db87a','#e07a30','#8a55d4','#d45580','#30a8d4','#50c87a'];
  let hash=0; for(let i=0;i<profile.length;i++) hash=profile.charCodeAt(i)+((hash<<5)-hash);
  const av = document.getElementById('headerAvatar');
  av.textContent = profile[0].toUpperCase();
  av.style.background = COLORS[Math.abs(hash)%COLORS.length];
}

const rawResult = localStorage.getItem('ponk_result');
const rawMeta   = localStorage.getItem('ponk_meta');
const audioData = localStorage.getItem('ponk_audio');

if (!rawResult) { window.location.href = '/'; }
else {
  let data, meta;
  try { data = JSON.parse(rawResult); } catch(e) { data = null; }
  try { meta = JSON.parse(rawMeta); } catch(e) { meta = {}; }
  if (data) render(data, meta);
}

function render(data, meta) {
  const modes = data.modes || [];
  const c = document.getElementById('cards');

  if (meta && (meta.datetime || meta.duration))
    document.getElementById('meta').textContent = (meta.datetime||'') + (meta.duration?' · '+meta.duration:'');

  // ── Synthèse ──
  if (data.summary) {
    const s = data.summary;
    // Rétrocompatibilité : si summary est un string (ancien format)
    if (typeof s === 'string') {
      const html = s.replace(/[*][*](.*?)[*][*]/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
      c.appendChild(makeCard('📝 Synthèse', `<div class="sec"><p>${html}</p></div>`, true));
    } else {
      // Nouveau format structuré
      c.appendChild(makeCard('📝 Synthèse', buildSummaryHTML(s), true));
    }
  }

  // ── Actions IA ──
  const geminiActions = data.actions_ia || [];
  const bubbleActions = (() => {
    try {
      const saved = JSON.parse(localStorage.getItem('ponk_action_bubbles') || '[]');
      return saved.map(b => ({
        type: b.type, icone: b.icon || '💬',
        titre: b.label || b.type, description: b.text,
        _fromBubble: true, _done: b.confirmed === 'done'
      }));
    } catch(e) { return []; }
  })();

  // Bulles done et kept remplacent toutes les deux l'action Gemini du même type
  const seenBubble = {};
  bubbleActions.forEach(b => seenBubble[b.type] = b);

  // Garder les actions Gemini seulement si pas de bulle du même type
  const geminiFiltered = geminiActions.filter(a => !seenBubble[a.type]);

  // Résultat : bulles en premier, puis actions Gemini non écrasées
  const deduped = [...bubbleActions, ...geminiFiltered];
  // Si une action ANALYSE existe, supprimer les RECHERCHE (doublon thématique)
  const hasAnalyse = deduped.some(a =>
    a.type === 'ANALYSE' || (a.titre && /analys/i.test(a.titre)) || (a.description && /analys/i.test(a.description))
  );
  const allActions = hasAnalyse
    ? deduped.filter(a => a.type !== 'RECHERCHE')
    : deduped;

  if (allActions.length > 0) {
    const actionsHTML = `<div class="actions-ia-wrap">${allActions.map(a => buildActionCard(a)).join('')}</div>`;
    c.appendChild(makeCard('✨ Actions IA', actionsHTML));
  }
  localStorage.removeItem('ponk_action_bubbles');

  // ── Courses ──
  if (modes.includes('COURSES') && data.courses?.items?.length) {
    const list = data.courses.items.map(it =>
      `<li onclick="toggleCheck(this)"><div class="cb"></div><span>${it.quantite ? it.quantite+' ' : ''}${it.nom}</span></li>`
    ).join('');
    c.appendChild(makeCard('🛒 Courses', `<ul class="checks">${list}</ul>`, true));
  }

  // ── Audio ──
  if (audioData) {
    audioEl = new Audio(audioData);
    audioEl.ontimeupdate = () => {
      if (!audioEl.duration) return;
      const pct = (audioEl.currentTime / audioEl.duration) * 100;
      const fill = document.getElementById('progressFill');
      const cur  = document.getElementById('timeCurrent');
      if (fill) fill.style.width = pct + '%';
      if (cur)  cur.textContent = fmtTime(audioEl.currentTime);
    };
    audioEl.onloadedmetadata = () => {
      const dur = document.getElementById('timeDuration');
      if (dur) dur.textContent = fmtTime(audioEl.duration);
    };
    audioEl.onended = () => {
      const btn = document.getElementById('playBtn');
      if (btn) btn.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16"><path d="M8 5v14l11-7z"/></svg>';
      const fill = document.getElementById('progressFill');
      if (fill) fill.style.width = '0%';
    };
    const playerHTML = `<div class="audio-player"><div class="player-controls">
      <button class="play-btn" id="playBtn" onclick="togglePlay()">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar" onclick="seekAudio(event)">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-times">
          <span id="timeCurrent">0:00</span>
          <span id="timeDuration">0:00</span>
        </div>
      </div>
    </div></div>`;
    const aCard = makeCard('🎙 Réécouter', playerHTML);
    aCard.querySelector('.card-bd').classList.add('hidden');
    aCard.querySelector('.chevron').classList.add('closed');
    c.appendChild(aCard);
  }

  // ── Transcription ──
  if (data.transcript) {
    const tCard = makeCard('📄 Transcription', `<div class="transcript-text">${data.transcript}</div>`, true);
    tCard.querySelector('.card-bd').classList.add('hidden');
    tCard.querySelector('.chevron').classList.add('closed');
    c.appendChild(tCard);
  }
}

// ── Construit le HTML de la synthèse structurée ──
function buildSummaryHTML(s) {
  let html = '';

  // Contexte
  if (s.contexte) {
    html += `<div class="summary-contexte">ℹ️ ${s.contexte}</div>`;
  }

  // Points discutés
  if (s.points_discutes?.length) {
    html += `<div class="summary-section">
      <div class="summary-section-title">💬 Points discutés</div>
      <div class="points-list">
        ${s.points_discutes.map(p => `<div class="point-item">${p}</div>`).join('')}
      </div>
    </div>`;
  }

  // Décisions
  if (s.decisions?.length) {
    html += `<div class="summary-section">
      <div class="summary-section-title">✅ Décisions</div>
      <div class="decisions-list">
        ${s.decisions.map(d => `
          <div class="decision-item">
            <div class="decision-dot"></div>
            <span>${d}</span>
          </div>`).join('')}
      </div>
    </div>`;
  }

  // Actions
  if (s.actions?.length) {
    const rows = s.actions.map(a => `
      <tr>
        <td>${a.qui ? `<span class="qui-badge">${a.qui}</span>` : `<span class="indefini">À définir</span>`}</td>
        <td style="padding-left:8px">${a.quoi || ''}</td>
        <td>${a.quand ? `<span class="quand-badge">${a.quand}</span>` : ''}</td>
      </tr>`).join('');

    html += `<div class="summary-section">
      <div class="summary-section-title">⚡ Actions</div>
      <table class="actions-table">
        <thead><tr>
          <th>Qui</th><th>Quoi</th><th>Quand</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }

  // Prochaine étape
  if (s.prochaine_etape) {
    html += `<div class="summary-section">
      <div class="summary-section-title">📅 Prochaine étape</div>
      <div class="prochaine-wrap">
        <span class="prochaine-icon">📅</span>
        <span class="prochaine-text">${s.prochaine_etape}</span>
      </div>
    </div>`;
  }

  return html || '<div class="sec"><p style="color:var(--muted);font-style:italic">Aucune information extraite.</p></div>';
}

function buildActionCard(a) {
  const isAnalyse = a.type === 'ANALYSE' ||
    (a.description && /analys|étude|compar|bilan|rapport/i.test(a.description)) ||
    (a.titre && /analys|étude|compar|bilan|rapport/i.test(a.titre));
  if (isAnalyse) {
    const id = 'analyse_' + (analyseCardCounter++);
    return `<div class="action-ia-card" style="flex-direction:column;align-items:stretch;">
      <div style="display:flex;align-items:center;gap:14px;" onclick="runDeepAnalysis('${id}', this.getAttribute('data-query'))" data-query="${(a.description || a.titre).replace(/"/g,'&quot;')}">
        <div class="action-ia-icon">${a.icone}</div>
        <div class="action-ia-info">
          <div class="action-ia-titre">${a.titre}</div>
          <div class="action-ia-desc">${a.description}</div>
        </div>
        <div class="action-ia-arrow" id="arrow_${id}">
          <svg viewBox="0 0 24 24" width="14" height="14"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <div class="analysis-loading" id="loading_${id}"><div class="analysis-spinner"></div><span>Analyse en cours…</span></div>
      <div class="analysis-result" id="result_${id}"></div>
    </div>`;
  }
  const url = getActionUrl(a);
  // Bulle "Faire" déjà exécutée → badge vert ✓ à la place de la flèche
  // ✓ vert UNIQUEMENT si bulle explicitement exécutée (_done = confirmed 'done')
  if (a._done) {
    return `<div class="action-ia-card" style="opacity:0.75;cursor:default;">
      <div class="action-ia-icon">${a.icone}</div>
      <div class="action-ia-info">
        <div class="action-ia-titre">${a.titre}</div>
        <div class="action-ia-desc">${a.description}</div>
      </div>
      <div style="width:28px;height:28px;border-radius:50%;background:rgba(61,184,122,0.15);border:1.5px solid rgba(61,184,122,0.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <span style="color:#3db87a;font-size:14px;font-weight:700">✓</span>
      </div>
    </div>`;
  }
  // Carte cliquable — ID unique basé sur type+titre+description pour éviter collisions
  const actionId = 'action_' + btoa(encodeURIComponent((a.type||'') + (a.titre||'') + (a.description||'').substring(0,20))).substring(0,20);
  ACTION_REGISTRY[actionId] = url || '';
  // ✓ vert si cliqué depuis les résultats (localStorage) — seulement pour actions Gemini
  const alreadyDone = !a._fromBubble && localStorage.getItem('ponk_done_' + actionId);
  if (alreadyDone) {
    return `<div class="action-ia-card" style="opacity:0.75;cursor:default;">
      <div class="action-ia-icon">${a.icone}</div>
      <div class="action-ia-info">
        <div class="action-ia-titre">${a.titre}</div>
        <div class="action-ia-desc">${a.description}</div>
      </div>
      <div style="width:28px;height:28px;border-radius:50%;background:rgba(61,184,122,0.15);border:1.5px solid rgba(61,184,122,0.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <span style="color:#3db87a;font-size:14px;font-weight:700">✓</span>
      </div>
    </div>`;
  }
  return `<div class="action-ia-card" id="${actionId}" onclick="markActionDone('${actionId}')">
    <div class="action-ia-icon">${a.icone}</div>
    <div class="action-ia-info">
      <div class="action-ia-titre">${a.titre}</div>
      <div class="action-ia-desc">${a.description}</div>
    </div>
    <div class="action-ia-arrow"><svg viewBox="0 0 24 24" width="14" height="14"><path d="M8 5v14l11-7z"/></svg></div>
  </div>`;
}

async function runDeepAnalysis(id, query) {
  const loading = document.getElementById('loading_' + id);
  const result  = document.getElementById('result_' + id);
  const arrow   = document.getElementById('arrow_' + id);
  if (!loading || !result) return;
  if (result.classList.contains('visible')) { result.classList.remove('visible'); return; }
  loading.classList.add('visible');
  if (arrow) arrow.style.display = 'none';
  try {
    const res = await fetch('/api/calendrier', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({query})
    });
    const data = await res.json();
    if (data.analysis) {
      result.innerHTML = data.analysis
        .replace(/[*][*](.*?)[*][*]/g, '<strong>$1</strong>')
        .replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
      result.classList.add('visible');
    }
  } catch(e) {
    result.innerHTML = 'Erreur lors de l\'analyse.';
    result.classList.add('visible');
  }
  loading.classList.remove('visible');
  if (arrow) arrow.style.display = 'flex';
}

function markActionDone(actionId) {
  const url = ACTION_REGISTRY[actionId] || '';
  // Ouvrir l'URL
  if (url && url !== 'null' && url !== '') window.open(url, '_blank');
  // Marquer comme fait dans localStorage
  localStorage.setItem('ponk_done_' + actionId, '1');
  // Mettre à jour visuellement la carte
  const el = document.getElementById(actionId);
  if (!el) return;
  el.onclick = null;
  el.style.opacity = '0.75';
  el.style.cursor = 'default';
  const arrow = el.querySelector('.action-ia-arrow');
  if (arrow) arrow.outerHTML = `<div style="width:28px;height:28px;border-radius:50%;background:rgba(61,184,122,0.15);border:1.5px solid rgba(61,184,122,0.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><span style="color:#3db87a;font-size:14px;font-weight:700">✓</span></div>`;
}

function getActionUrl(a) {
  const prefMail = localStorage.getItem('ponk_pref_mail')  || 'gmail';
  const prefCal  = localStorage.getItem('ponk_pref_cal')   || 'google';
  const prefMaps = localStorage.getItem('ponk_pref_maps')  || 'google';
  switch(a.type) {
    case 'EMAIL': {
      const sujet = encodeURIComponent(a.sujet || a.titre || '');
      const corps = encodeURIComponent(a.corps || a.description || '');
      if (prefMail === 'gmail')   return `https://mail.google.com/mail/?view=cm&fs=1&su=${sujet}&body=${corps}`;
      if (prefMail === 'outlook') return `https://outlook.live.com/mail/0/deeplink/compose?subject=${sujet}&body=${corps}`;
      if (prefMail === 'yahoo')   return `https://compose.mail.yahoo.com/?subject=${sujet}&body=${corps}`;
      return `mailto:?subject=${sujet}&body=${corps}`;
    }
    case 'WHATSAPP': return `https://wa.me/?text=${encodeURIComponent(a.message || a.description)}`;
    case 'APPEL': { const phone=(a.telephone||a.phone||'').replace(/[^0-9+]/g,''); return phone?`tel:${phone}`:`tel:`; }
    case 'CALENDRIER': {
      const titre = encodeURIComponent(a.evenement || a.titre);
      const desc  = encodeURIComponent(a.description || '');
      if (prefCal === 'google')  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${titre}&details=${desc}`;
      if (prefCal === 'outlook') return `https://outlook.live.com/calendar/0/deeplink/compose?subject=${titre}&body=${desc}`;
      return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${titre}&details=${desc}`;
    }
    case 'MAPS': {
      const addr = encodeURIComponent(a.adresse || a.description);
      if (prefMaps === 'google') return `https://www.google.com/maps/search/?api=1&query=${addr}`;
      if (prefMaps === 'waze')   return `https://waze.com/ul?q=${addr}`;
      if (prefMaps === 'apple')  return `https://maps.apple.com/?q=${addr}`;
      return `https://www.google.com/maps/search/?api=1&query=${addr}`;
    }
    case 'RAPPEL': return `javascript:navigator.clipboard.writeText(${JSON.stringify(a.texte||a.description)}).then(()=>alert('Copié !'))`;
    case 'RECHERCHE': return `https://www.google.com/search?q=${encodeURIComponent(a.query||a.description)}`;
    case 'COMMANDE': return `https://www.google.com/search?q=${encodeURIComponent(a.query||a.description)}&tbm=shop`;
    default: return '#';
  }
}

function makeCard(title, html, copyable=false) {
  const d = document.createElement('div'); d.className = 'card';
  d.innerHTML = `<div class="card-hd" onclick="toggleCard(this)"><span class="card-lbl">${title}</span><div class="card-controls">${copyable?`<button class="copy-btn" onclick="copyCard(this);event.stopPropagation()">Copier</button>`:''}<span class="chevron">▾</span></div></div><div class="card-bd">${html}</div>`;
  return d;
}
function toggleCard(hd) { const bd=hd.nextElementSibling,ch=hd.querySelector('.chevron'); bd.classList.toggle('hidden'); ch.classList.toggle('closed'); }
function toggleCheck(li) { li.classList.toggle('done'); li.querySelector('.cb').textContent=li.classList.contains('done')?'✓':''; }
function togglePlay() {
  if (!audioEl) return;
  const btn = document.getElementById('playBtn');
  if (audioEl.paused) {
    audioEl.play();
    btn.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
  } else {
    audioEl.pause();
    btn.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16"><path d="M8 5v14l11-7z"/></svg>';
  }
}
function seekAudio(e) {
  if (!audioEl || !audioEl.duration) return;
  const bar = document.getElementById('progressBar');
  const rect = bar.getBoundingClientRect();
  audioEl.currentTime = ((e.clientX - rect.left) / rect.width) * audioEl.duration;
}
function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
}
function copyCard(btn) {
  const bd = btn.closest('.card').querySelector('.card-bd');
  navigator.clipboard.writeText(bd.innerText||bd.textContent).then(()=>{btn.textContent='✓';setTimeout(()=>btn.textContent='Copier',2000);});
}

function exportPDF() {
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({unit:'mm', format:'a4'});
  const margin = 20, maxW = 170; let y = 24;
  function ln(text, size, bold, color) {
    doc.setFontSize(size||11); doc.setFont('helvetica', bold?'bold':'normal');
    doc.setTextColor(color||'#2a2a3a');
    const lines = doc.splitTextToSize(String(text||''), maxW);
    if (y + lines.length*(size||11)*0.45 > 272) { doc.addPage(); y = 20; }
    doc.text(lines, margin, y); y += lines.length*(size||11)*0.45+3;
  }
  const data = JSON.parse(localStorage.getItem('ponk_result')||'{}');
  const meta = JSON.parse(localStorage.getItem('ponk_meta')||'{}');
  ln('Ponk Note', 22, true);
  if (meta.datetime||meta.duration) ln((meta.datetime||'')+(meta.duration?' · '+meta.duration:''), 9, false, '#86868b');
  if (meta.title) ln(meta.title, 14, true);
  y+=2; doc.setDrawColor(200,200,200); doc.line(margin,y,margin+maxW,y); y+=6;

  // Synthèse structurée dans le PDF
  if (data.summary) {
    const s = data.summary;
    if (typeof s === 'string') {
      ln('SYNTHÈSE', 8, true, '#86868b'); ln(s, 11); y+=2;
    } else {
      ln('SYNTHÈSE', 8, true, '#86868b');
      if (s.contexte) { ln(s.contexte, 10, false, '#86868b'); y+=1; }
      if (s.points_discutes?.length) {
        ln('Points discutés :', 9, true); s.points_discutes.forEach(p => ln('— '+p, 10)); y+=1;
      }
      if (s.decisions?.length) {
        ln('Décisions :', 9, true); s.decisions.forEach(d => ln('✓ '+d, 10)); y+=1;
      }
      if (s.actions?.length) {
        ln('Actions :', 9, true);
        s.actions.forEach(a => ln((a.qui||'À définir')+' → '+a.quoi+(a.quand?' ('+a.quand+')':''), 10));
        y+=1;
      }
      if (s.prochaine_etape) { ln('Prochaine étape : '+s.prochaine_etape, 10, true); y+=1; }
      y+=2;
    }
  }
  doc.save((meta.title||'ponk-note')+'-'+new Date().toISOString().slice(0,10)+'.pdf');
}

async function sendByEmail() {
  const email = localStorage.getItem('ponk_email');
  const name  = localStorage.getItem('ponk_profile');
  if (!email) { alert('Aucune adresse email dans ton profil.'); return; }
  const btn = document.getElementById('emailBtn');
  btn.disabled = true; btn.textContent = '⏳ Génération…';
  try {
    const {jsPDF} = window.jspdf;
    const doc = new jsPDF({unit:'mm', format:'a4'});
    const margin = 20, maxW = 170; let y = 24;
    function ln(text, size, bold, color) {
      doc.setFontSize(size||11); doc.setFont('helvetica', bold?'bold':'normal');
      doc.setTextColor(color||'#2a2a3a');
      const lines = doc.splitTextToSize(String(text||''), maxW);
      if (y + lines.length*(size||11)*0.45 > 272) { doc.addPage(); y = 20; }
      doc.text(lines, margin, y); y += lines.length*(size||11)*0.45+3;
    }
    const data = JSON.parse(localStorage.getItem('ponk_result')||'{}');
    const meta = JSON.parse(localStorage.getItem('ponk_meta')||'{}');
    ln('Ponk Note', 22, true);
    if (meta.datetime||meta.duration) ln((meta.datetime||'')+(meta.duration?' · '+meta.duration:''), 9, false, '#86868b');
    if (meta.title) ln(meta.title, 14, true);
    y+=2; doc.setDrawColor(200,200,200); doc.line(margin,y,margin+maxW,y); y+=6;
    if (data.summary) {
      const s = data.summary;
      if (typeof s === 'string') {
        ln('SYNTHÈSE', 8, true, '#86868b'); ln(s, 11); y+=2;
      } else {
        ln('SYNTHÈSE', 8, true, '#86868b');
        if (s.contexte) ln(s.contexte, 10, false, '#86868b');
        if (s.points_discutes?.length) { ln('Points discutés :', 9, true); s.points_discutes.forEach(p => ln('— '+p, 10)); }
        if (s.decisions?.length) { ln('Décisions :', 9, true); s.decisions.forEach(d => ln('✓ '+d, 10)); }
        if (s.actions?.length) { ln('Actions :', 9, true); s.actions.forEach(a => ln((a.qui||'À définir')+' → '+a.quoi+(a.quand?' ('+a.quand+')':''), 10)); }
        if (s.prochaine_etape) ln('Prochaine étape : '+s.prochaine_etape, 10, true);
        y+=2;
      }
    }
    const pdfBase64 = doc.output('datauristring');
    btn.textContent = '⏳ Envoi…';
    const res = await fetch('/api/sendmail', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, name, pdfBase64, title: meta.title||'Analyse', datetime: meta.datetime||''})
    });
    if (!res.ok) throw new Error('Erreur '+res.status);
    btn.textContent = '✅ Email envoyé !';
    setTimeout(() => { btn.disabled=false; btn.textContent='✉ Envoyer par email'; }, 3000);
  } catch(e) {
    btn.disabled = false; btn.textContent = '✉ Envoyer par email';
    alert('Erreur : '+e.message);
  }
}
