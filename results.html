<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ponk Note — Résultats</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #fff; color: #1c1c1c; margin: 0; padding: 0 20px 80px; }
    h2 { font-size: 15px; font-weight: 500; padding: 20px 0 16px; border-bottom: 1px solid #e8e8e8; margin-bottom: 16px; display: flex; justify-content: space-between; }
    a { color: #aaa; font-size: 13px; text-decoration: none; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 100px; background: #f4f4f4; border: 1px solid #e8e8e8; font-size: 11px; color: #aaa; margin: 0 4px 4px 0; }
    .card { border: 1px solid #e8e8e8; border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
    .card-title { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: #aaa; padding: 12px 14px; cursor: pointer; display: flex; justify-content: space-between; }
    .card-body { padding: 0 14px 14px; border-top: 1px solid #e8e8e8; }
    .card-body p { font-size: 14px; line-height: 1.7; padding-top: 12px; }
    .section { padding-top: 12px; }
    .section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; color: #aaa; margin-bottom: 6px; }
    ul { list-style: none; padding: 0; margin: 8px 0 0; }
    ul li { padding: 9px 11px; background: #f4f4f4; border-radius: 8px; font-size: 13px; margin-bottom: 6px; }
    ul li::before { content: '— '; color: #aaa; }
    .checklist li { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .checklist li.done { opacity: .45; text-decoration: line-through; }
    .checkbox { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid #e8e8e8; background: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 11px; }
    .checklist li.done .checkbox { background: #1c1c1c; border-color: #1c1c1c; color: #fff; }
    .loc { display: flex; align-items: center; gap: 8px; padding: 9px 11px; background: #f4f4f4; border-radius: 8px; margin-top: 6px; text-decoration: none; color: #1c1c1c; border: 1px solid #e8e8e8; }
    table { width: 100%; margin-top: 10px; border-collapse: collapse; }
    td { padding: 8px 0; font-size: 13px; border-bottom: 1px solid #e8e8e8; }
    td:last-child { text-align: right; font-family: 'DM Mono', monospace; }
    tr:last-child td { border-bottom: none; font-weight: 500; }
    .meta { font-size: 12px; color: #aaa; font-family: 'DM Mono', monospace; margin-bottom: 10px; }
    .copy { background: none; border: 1px solid #e8e8e8; color: #aaa; padding: 3px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; }
    .audio-wrap { padding-top: 14px; }
    .audio-row { display: flex; align-items: center; gap: 12px; }
    .play { width: 40px; height: 40px; border-radius: 50%; background: #1c1c1c; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .play svg { fill: white; }
    .prog-wrap { flex: 1; }
    .prog-bar { width: 100%; height: 20px; position: relative; display: flex; align-items: center; cursor: pointer; }
    .prog-track { width: 100%; height: 3px; background: #e8e8e8; border-radius: 2px; }
    .prog-fill { height: 100%; background: #1c1c1c; border-radius: 2px; width: 0%; }
    .prog-thumb { position: absolute; top: 50%; left: 0; transform: translate(-50%, -50%); width: 14px; height: 14px; border-radius: 50%; background: #1c1c1c; pointer-events: none; }
    .times { display: flex; justify-content: space-between; font-family: 'DM Mono', monospace; font-size: 10px; color: #aaa; margin-top: 2px; }
  </style>
</head>
<body>
  <h2>Ponk <span style="color:#aaa;font-weight:300">Note</span> <a href="/">← Nouveau</a></h2>
  <div id="meta" class="meta"></div>
  <div id="modes" style="margin-bottom:12px"></div>
  <div id="content"></div>

<script>
const LABELS = {REUNION:'🏢 Réunion',COURSES:'🛒 Courses',CHANTIER:'🔨 Chantier',IDEES:'💡 Idées',DEPLACEMENT:'📍 Déplacement',FINANCE:'💰 Finance',APPEL:'📞 Appel',MEDICAL:'🏥 Médical',COURS:'🎓 Cours',MEMO:'📝 Mémo'};
let audioEl = null;

const raw = localStorage.getItem('ponk_result');
const audioData = localStorage.getItem('ponk_audio');
const metaRaw = localStorage.getItem('ponk_meta');
if (!raw) { window.location.href='/'; }
else {
  const data = JSON.parse(raw);
  const meta = metaRaw ? JSON.parse(metaRaw) : {};
  const modes = data.modes || [];
  const c = document.getElementById('content');

  if (meta.datetime||meta.duration)
    document.getElementById('meta').textContent = (meta.datetime||'') + (meta.duration?' · '+meta.duration:'');

  document.getElementById('modes').innerHTML = modes.map(m=>`<span class="badge">${LABELS[m]||m}</span>`).join('');

  if (data.summary) c.appendChild(card('📝 Synthèse', `<div class="section"><p>${data.summary}</p></div>`));

  if (modes.includes('REUNION')&&data.reunion) {
    const r=data.reunion; let h='';
    if(r.participants?.length) h+=sec('👥 Participants',r.participants.join(', '));
    if(r.decisions?.length) h+=sec('✅ Décisions',lis(r.decisions));
    if(r.actions?.length) h+=sec('⚡ Actions',lis(r.actions));
    if(r.prochaine) h+=sec('📅 Prochaine',r.prochaine);
    if(h) c.appendChild(card('🏢 Réunion',h,true));
  }

  if (modes.includes('COURSES')&&data.courses?.items?.length) {
    const list=data.courses.items.map(it=>`<li onclick="this.classList.toggle('done');this.querySelector('.checkbox').textContent=this.classList.contains('done')?'✓':''"><div class="checkbox"></div><span>${it.quantite?it.quantite+' ':''}${it.nom}</span></li>`).join('');
    c.appendChild(card('🛒 Courses',`<ul class="checklist">${list}</ul>`,true));
  }

  if (modes.includes('CHANTIER')&&data.chantier) {
    const ch=data.chantier; let h='';
    if(ch.lieu) h+=sec('📍 Lieu',ch.lieu);
    if(ch.materiaux?.length) h+=sec('🧱 Matériaux',lis(ch.materiaux.map(m=>m.nom+(m.quantite?' — '+m.quantite:''))));
    if(ch.artisans?.length) h+=sec('👷 Artisans',lis(ch.artisans));
    if(ch.budget) h+=sec('💰 Budget',ch.budget);
    if(ch.planning?.length) h+=sec('📋 Planning',lis(ch.planning));
    if(h) c.appendChild(card('🔨 Chantier',h,true));
  }

  if (modes.includes('IDEES')&&data.idees) {
    const id=data.idees; let h='';
    if(id.liste?.length) h+=sec('💡 Idées',lis(id.liste));
    if(id.aApprofondir?.length) h+=sec('🔍 À approfondir',lis(id.aApprofondir));
    if(h) c.appendChild(card('💡 Idées',h,true));
  }

  if (modes.includes('DEPLACEMENT')&&data.deplacement) {
    const d=data.deplacement; let h='';
    if(d.lieux?.length) {
      h+='<div class="section"><div class="section-title">📍 Lieux</div>';
      d.lieux.forEach(l=>{
        const q=encodeURIComponent(l.adresse||l.nom);
        h+=`<a class="loc" href="https://www.google.com/maps/search/?api=1&query=${q}" target="_blank">📍 <div style="flex:1"><div style="font-weight:500">${l.nom}</div>${l.adresse?`<div style="font-size:11px;color:#aaa">${l.adresse}</div>`:''}</div>→</a>`;
      });
      h+='</div>';
    }
    if(d.horaires?.length) h+=sec('🕐 Horaires',lis(d.horaires));
    if(d.personnes?.length) h+=sec('👤 Personnes',lis(d.personnes));
    if(h) c.appendChild(card('📍 Déplacement',h,true));
  }

  if (modes.includes('FINANCE')&&data.finance?.montants?.length) {
    const f=data.finance;
    let rows=f.montants.map(m=>`<tr><td>${m.description}</td><td>${m.montant}</td></tr>`).join('');
    if(f.total) rows+=`<tr><td><strong>Total</strong></td><td><strong>${f.total}</strong></td></tr>`;
    c.appendChild(card('💰 Finance',`<div class="section"><table>${rows}</table></div>`,true));
  }

  if (modes.includes('APPEL')&&data.appel) {
    const a=data.appel; let h='';
    if(a.interlocuteur) h+=sec('👤 Interlocuteur',a.interlocuteur);
    if(a.sujet) h+=sec('💬 Sujet',a.sujet);
    if(a.suite?.length) h+=sec('⚡ Suite',lis(a.suite));
    if(h) c.appendChild(card('📞 Appel',h,true));
  }

  if (modes.includes('MEDICAL')&&data.medical) {
    const m=data.medical; let h='';
    if(m.medicaments?.length) h+=sec('💊 Médicaments',lis(m.medicaments.map(med=>med.nom+(med.dosage?' — '+med.dosage:''))));
    if(m.symptomes?.length) h+=sec('🤒 Symptômes',lis(m.symptomes));
    if(m.rdv) h+=sec('📅 Rendez-vous',m.rdv);
    if(h) c.appendChild(card('🏥 Médical',h,true));
  }

  if (modes.includes('COURS')&&data.cours) {
    const co=data.cours; let h='';
    if(co.matiere) h+=sec('📚 Matière',co.matiere);
    if(co.pointsCles?.length) h+=sec('🔑 Points clés',lis(co.pointsCles));
    if(co.aRetenir?.length) h+=sec('⭐ À retenir',lis(co.aRetenir));
    if(co.questions?.length) h+=sec('❓ Questions',lis(co.questions));
    if(h) c.appendChild(card('🎓 Cours',h,true));
  }

  if (modes.includes('MEMO')&&data.memo) {
    const m=data.memo; let h='';
    if(m.rappels?.length) h+=sec('🔔 Rappels',lis(m.rappels));
    if(m.notes) h+=sec('📝 Note',m.notes);
    if(h) c.appendChild(card('📝 Mémo',h,true));
  }

  if (audioData) {
    audioEl = new Audio(audioData);
    audioEl.onloadedmetadata = () => { document.getElementById('tot').textContent = ft(audioEl.duration); };
    audioEl.ontimeupdate = () => {
      if(!audioEl.duration) return;
      const p=(audioEl.currentTime/audioEl.duration)*100;
      document.getElementById('pf').style.width=p+'%';
      document.getElementById('pt').style.left=p+'%';
      document.getElementById('cur').textContent=ft(audioEl.currentTime);
    };
    audioEl.onended = () => { document.getElementById('pi').innerHTML='<path d="M8 5v14l11-7z"/>'; };

    const ac = card('🎙 Écouter', `<div class="audio-wrap"><div class="audio-row">
      <button class="play" onclick="togglePlay()"><svg id="pi" viewBox="0 0 24 24" width="16" height="16"><path d="M8 5v14l11-7z"/></svg></button>
      <div class="prog-wrap">
        <div class="prog-bar" id="pb"><div class="prog-track"><div class="prog-fill" id="pf"></div></div><div class="prog-thumb" id="pt"></div></div>
        <div class="times"><span id="cur">0:00</span><span id="tot">0:00</span></div>
      </div>
    </div></div>`);
    c.appendChild(ac);

    const pb = document.getElementById('pb');
    let drag = false;
    const seek = x => { if(!audioEl.duration) return; const r=pb.getBoundingClientRect(); audioEl.currentTime=Math.min(1,Math.max(0,(x-r.left)/r.width))*audioEl.duration; };
    pb.addEventListener('mousedown',e=>{drag=true;seek(e.clientX);e.preventDefault();});
    document.addEventListener('mousemove',e=>{if(drag)seek(e.clientX);});
    document.addEventListener('mouseup',()=>drag=false);
    pb.addEventListener('touchstart',e=>{drag=true;seek(e.touches[0].clientX);e.preventDefault();},{passive:false});
    document.addEventListener('touchmove',e=>{if(drag){seek(e.touches[0].clientX);e.preventDefault();}},{passive:false});
    document.addEventListener('touchend',()=>{drag=false;});
  }
}

function togglePlay() {
  if(!audioEl) return;
  if(audioEl.paused) { audioEl.play(); document.getElementById('pi').innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; }
  else { audioEl.pause(); document.getElementById('pi').innerHTML='<path d="M8 5v14l11-7z"/>'; }
}

function card(title, html, copyable=false) {
  const id='c'+Math.random().toString(36).substr(2,5);
  const d=document.createElement('div');
  d.className='card'; d.id=id;
  d.innerHTML=`<div class="card-title" onclick="document.getElementById('${id}').querySelector('.card-body').style.display=document.getElementById('${id}').querySelector('.card-body').style.display==='none'?'block':''">
    ${title}
    ${copyable?`<button class="copy" onclick="navigator.clipboard.writeText(document.getElementById('${id}').querySelector('.card-body').innerText);event.stopPropagation()">Copier</button>`:''}
  </div><div class="card-body">${html}</div>`;
  return d;
}

function sec(title, content) {
  return `<div class="section"><div class="section-title">${title}</div><p>${content}</p></div>`;
}

function lis(arr) {
  return `<ul>${arr.map(i=>`<li>${i}</li>`).join('')}</ul>`;
}

function ft(s) {
  return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');
}
</script>
</body>
</html>
