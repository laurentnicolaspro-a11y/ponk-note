<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ponk Note</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --border: #e6e6e6;
      --text: #1a1a1a;
      --muted: #999999;
      --danger: #d42020;
      --green: #22c55e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      padding-left: 22px;
      padding-right: 22px;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 12px);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    #headerMeta {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Views ── */
    .view {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    .view.active { display: flex; }

    /* ── RECORDER VIEW ── */
    .recorder {
      display: flex;
      flex-direction: column;
      flex: 1;
      padding: 20px 0 8px;
      gap: 16px;
    }

    .title-field input {
      width: 100%;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
      font-family: inherit;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      flex-shrink: 0;
    }
    .title-field input:focus { border-color: var(--text); }
    .title-field input::placeholder { color: var(--muted); }

    .visualizer-wrap {
      flex: 1;
      min-height: 56px;
      background: var(--surface);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    canvas#visualizer {
      width: 100%;
      height: 100%;
      display: block;
    }

    .viz-idle {
      position: absolute;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    .timer {
      text-align: center;
      font-size: 40px;
      font-weight: 300;
      letter-spacing: 3px;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      transition: color 0.3s;
    }
    .timer.recording { color: var(--danger); }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn {
      padding: 14px 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: background 0.12s, opacity 0.12s;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .btn:active { background: var(--border); }
    .btn:disabled { opacity: 0.28; cursor: not-allowed; }

    .btn-primary {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    .btn-primary:active { background: #333; }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--surface);
      border-radius: 9px;
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.active { background: var(--green); }
    .status-dot.error { background: var(--danger); }
    .status-dot.loading {
      background: var(--text);
      animation: blink 0.8s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* ── RESULTS VIEW ── */
    .results-view {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      padding: 14px 0 0;
      gap: 10px;
    }

    .results-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .btn-back {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 0;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s;
    }
    .btn-back:active { color: var(--text); }

    .meta-info {
      font-size: 12px;
      color: var(--muted);
    }

    .results-scroll {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }

    .result-block {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s;
    }
    .result-header:active { background: var(--surface); }

    .result-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
    }

    .result-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chevron {
      font-size: 10px;
      color: var(--muted);
      transition: transform 0.2s;
      display: inline-block;
    }
    .result-block.collapsed .chevron { transform: rotate(-90deg); }
    .result-block.collapsed .result-body { display: none; }

    .result-body {
      padding: 0 14px 14px;
      border-top: 1px solid var(--border);
    }

    .result-body p {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      padding-top: 12px;
    }

    .result-body ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-top: 10px;
    }

    .result-body ul li {
      display: flex;
      gap: 8px;
      padding: 8px 10px;
      background: var(--surface);
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
    }

    .result-body ul li::before {
      content: '—';
      color: var(--muted);
      flex-shrink: 0;
    }

    .transcript-text {
      font-size: 13px;
      line-height: 1.8;
      color: var(--muted);
      padding-top: 12px;
    }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 3px 10px;
      border-radius: 5px;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .copy-btn:active { color: var(--text); }
    .copy-btn.copied { color: var(--green); border-color: var(--green); }

    /* Skeleton */
    .skeleton-line {
      height: 11px;
      background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      border-radius: 4px;
      animation: shimmer 1.4s infinite;
      margin-top: 12px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

<div class="app">
  <header>
    <span class="logo">Ponk Note</span>
    <span id="headerMeta"></span>
  </header>

  <!-- View 1 : Enregistrement -->
  <div class="view active" id="viewRecorder">
    <div class="recorder">
      <div class="title-field">
        <input type="text" id="meetingTitle" placeholder="Titre de la réunion…" />
      </div>

      <div class="visualizer-wrap">
        <canvas id="visualizer"></canvas>
        <span class="viz-idle" id="vizIdle">en attente</span>
      </div>

      <div class="timer" id="timer">00:00:00</div>

      <div class="controls">
        <button class="btn btn-primary" id="btnRecord" onclick="startRecording()">
          <span id="btnRecordLabel">Enregistrer</span>
        </button>
        <button class="btn" id="btnStop" onclick="stopRecording()" disabled>
          Arrêter
        </button>
        <button class="btn" id="btnAnalyze" onclick="analyzeRecording()" disabled>
          Analyser
        </button>
      </div>

      <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Prêt à enregistrer</span>
      </div>
    </div>
  </div>

  <!-- View 2 : Résultats -->
  <div class="view" id="viewResults">
    <div class="results-view">
      <div class="results-nav">
        <button class="btn-back" onclick="backToRecorder()">← Nouveau</button>
        <span class="meta-info" id="metaDuration"></span>
      </div>

      <div class="results-scroll">
        <div class="result-block" id="blockSummary">
          <div class="result-header" onclick="toggleBlock('blockSummary')">
            <span class="result-label">Résumé</span>
            <div class="result-controls">
              <button class="copy-btn" onclick="copyContent('summaryContent', this); event.stopPropagation()">Copier</button>
              <span class="chevron">▾</span>
            </div>
          </div>
          <div class="result-body" id="summaryContent"></div>
        </div>

        <div class="result-block" id="blockActions">
          <div class="result-header" onclick="toggleBlock('blockActions')">
            <span class="result-label">Points d'action</span>
            <div class="result-controls">
              <button class="copy-btn" onclick="copyContent('actionsContent', this); event.stopPropagation()">Copier</button>
              <span class="chevron">▾</span>
            </div>
          </div>
          <div class="result-body" id="actionsContent"></div>
        </div>

        <div class="result-block collapsed" id="blockTranscript">
          <div class="result-header" onclick="toggleBlock('blockTranscript')">
            <span class="result-label">Transcription</span>
            <div class="result-controls">
              <button class="copy-btn" onclick="copyContent('transcriptContent', this); event.stopPropagation()">Copier</button>
              <span class="chevron">▾</span>
            </div>
          </div>
          <div class="result-body">
            <div class="transcript-text" id="transcriptContent"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let mediaRecorder = null;
  let audioChunks = [];
  let audioBlob = null;
  let timerInterval = null;
  let seconds = 0;
  let audioContext = null;
  let analyser = null;
  let animFrame = null;

  // ── Timer ──
  function startTimer() {
    seconds = 0;
    timerInterval = setInterval(() => {
      seconds++;
      const h = String(Math.floor(seconds / 3600)).padStart(2, '0');
      const m = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
      const s = String(seconds % 60).padStart(2, '0');
      document.getElementById('timer').textContent = `${h}:${m}:${s}`;
    }, 1000);
  }

  function stopTimer() { clearInterval(timerInterval); }

  // ── Visualizer ──
  function startVisualizer(stream) {
    document.getElementById('vizIdle').style.display = 'none';
    audioContext = new AudioContext();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;
    const source = audioContext.createMediaStreamSource(stream);
    source.connect(analyser);
    drawVisualizer();
  }

  function drawVisualizer() {
    const canvas = document.getElementById('visualizer');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);

    function draw() {
      animFrame = requestAnimationFrame(draw);
      analyser.getByteFrequencyData(dataArray);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const barWidth = (canvas.width / bufferLength) * 2.2;
      let x = 0;
      for (let i = 0; i < bufferLength; i++) {
        const barHeight = (dataArray[i] / 255) * canvas.height * 0.85;
        const alpha = 0.4 + (dataArray[i] / 255) * 0.6;
        ctx.fillStyle = `rgba(26, 26, 26, ${alpha})`;
        ctx.beginPath();
        ctx.roundRect(x, canvas.height - barHeight, barWidth - 1, barHeight, 2);
        ctx.fill();
        x += barWidth;
      }
    }
    draw();
  }

  function stopVisualizer() {
    if (animFrame) cancelAnimationFrame(animFrame);
    if (audioContext) audioContext.close();
    document.getElementById('vizIdle').style.display = 'block';
    const canvas = document.getElementById('visualizer');
    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  }

  // ── Recording ──
  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        stream.getTracks().forEach(t => t.stop());
        stopVisualizer();
        setStatus('active', `Enregistrement prêt — ${formatDuration(seconds)}`);
        document.getElementById('btnAnalyze').disabled = false;
      };
      mediaRecorder.start(500);
      startTimer();
      startVisualizer(stream);
      document.getElementById('timer').classList.add('recording');
      document.getElementById('btnRecord').disabled = true;
      document.getElementById('btnStop').disabled = false;
      document.getElementById('btnRecordLabel').textContent = 'En cours…';
      setStatus('loading', 'Enregistrement en cours…');
    } catch (e) {
      setStatus('error', 'Micro inaccessible — vérifiez les permissions');
    }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
      stopTimer();
      document.getElementById('timer').classList.remove('recording');
      document.getElementById('btnRecord').disabled = false;
      document.getElementById('btnStop').disabled = true;
      document.getElementById('btnRecordLabel').textContent = 'Enregistrer';
    }
  }

  // ── Analyze ──
  async function analyzeRecording() {
    if (!audioBlob) return;
    document.getElementById('btnAnalyze').disabled = true;

    const title = document.getElementById('meetingTitle').value || 'Réunion sans titre';
    const duration = formatDuration(seconds);

    // Passer à la vue résultats
    showView('viewResults');
    document.getElementById('metaDuration').textContent = duration;
    document.getElementById('headerMeta').textContent = title;

    showSkeleton('summaryContent');
    showSkeleton('actionsContent');
    document.getElementById('transcriptContent').textContent = 'Transcription en cours…';

    const formData = new FormData();
    formData.append('audio', audioBlob, 'recording.webm');
    formData.append('title', title);
    formData.append('duration', duration);

    try {
      const res = await fetch('/api/analyze', { method: 'POST', body: formData });
      if (!res.ok) throw new Error(`Erreur ${res.status}`);
      const data = await res.json();

      document.getElementById('summaryContent').innerHTML = `<p>${data.summary.replace(/\n/g, '<br>')}</p>`;

      const actions = data.actions || [];
      document.getElementById('actionsContent').innerHTML = actions.length
        ? `<ul>${actions.map(a => `<li>${a}</li>`).join('')}</ul>`
        : `<p style="color:var(--muted)">Aucun point d'action identifié.</p>`;

      document.getElementById('transcriptContent').textContent = data.transcript;
    } catch (e) {
      document.getElementById('summaryContent').innerHTML = `<p style="color:var(--danger)">${e.message}</p>`;
    }
  }

  // ── Navigation ──
  function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function backToRecorder() {
    audioBlob = null;
    audioChunks = [];
    seconds = 0;
    document.getElementById('timer').textContent = '00:00:00';
    document.getElementById('btnAnalyze').disabled = true;
    document.getElementById('meetingTitle').value = '';
    document.getElementById('headerMeta').textContent = '';
    setStatus('', 'Prêt à enregistrer');
    showView('viewRecorder');
  }

  // ── Utils ──
  function formatDuration(s) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) return `${h}h ${m}m`;
    if (m > 0) return `${m}m ${sec}s`;
    return `${sec}s`;
  }

  function setStatus(type, text) {
    document.getElementById('statusDot').className = 'status-dot' + (type ? ' ' + type : '');
    document.getElementById('statusText').textContent = text;
  }

  function showSkeleton(id) {
    document.getElementById(id).innerHTML = `
      <div class="skeleton-line" style="width:88%"></div>
      <div class="skeleton-line" style="width:72%"></div>
      <div class="skeleton-line" style="width:80%"></div>
      <div class="skeleton-line" style="width:58%"></div>`;
  }

  function toggleBlock(id) {
    document.getElementById(id).classList.toggle('collapsed');
  }

  function copyContent(id, btn) {
    const el = document.getElementById(id);
    navigator.clipboard.writeText(el.innerText || el.textContent).then(() => {
      btn.textContent = '✓ Copié';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copier'; btn.classList.remove('copied'); }, 2000);
    });
  }
</script>
</body>
</html>
