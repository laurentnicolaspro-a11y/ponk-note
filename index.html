<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ponk Note</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#fff; --surface:#f4f4f4; --border:#e8e8e8; --text:#1c1c1c; --muted:#aaa; --danger:#e02020; --green:#16a34a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; height:100dvh; overflow:hidden; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; -webkit-font-smoothing:antialiased; }
    .app { display:flex; flex-direction:column; height:100dvh; max-width:430px; margin:0 auto; padding:env(safe-area-inset-top,0px) 24px env(safe-area-inset-bottom,16px); }
    header { display:flex; align-items:center; justify-content:space-between; padding:20px 0 16px; flex-shrink:0; }
    .logo-text { font-size:15px; font-weight:500; }
    .logo-text span { color:var(--muted); font-weight:300; }
    .recorder { display:flex; flex-direction:column; flex:1; align-items:center; justify-content:space-between; padding:12px 0 8px; }
    .title-field { width:100%; }
    .title-field input { width:100%; background:none; border:none; border-bottom:1px solid var(--border); padding:10px 0; font-family:'DM Sans',sans-serif; font-size:15px; color:var(--text); outline:none; }
    .title-field input::placeholder { color:var(--muted); }
    .btn-zone { display:flex; flex-direction:column; align-items:center; gap:24px; flex:1; justify-content:center; }
    .record-btn { width:176px; height:176px; border-radius:50%; border:none; background:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; position:relative; -webkit-tap-highlight-color:transparent; }
    .record-btn:active { transform:scale(0.95); }
    .power-svg { width:140px; height:140px; }
    .power-ring, .power-line { fill:none; stroke:var(--text); stroke-width:8; stroke-linecap:round; transition:stroke 0.3s; }
    .record-btn.is-recording .power-ring, .record-btn.is-recording .power-line { stroke:var(--danger); }
    .pulse-ring { position:absolute; border-radius:50%; border:2px solid var(--danger); opacity:0; pointer-events:none; }
    .pulse-ring-1 { inset:-16px; }
    .pulse-ring-2 { inset:-32px; }
    .record-btn.is-recording .pulse-ring-1 { animation:pulse 1.6s ease-out infinite; }
    .record-btn.is-recording .pulse-ring-2 { animation:pulse 1.6s ease-out 0.5s infinite; }
    @keyframes pulse { 0%{opacity:.5;transform:scale(.95)} 100%{opacity:0;transform:scale(1.08)} }
    .btn-label { font-size:10px; font-weight:500; letter-spacing:2.5px; text-transform:uppercase; color:var(--muted); transition:color 0.3s; }
    .record-btn.is-recording .btn-label { color:var(--danger); }
    .timer { font-family:'DM Mono',monospace; font-size:17px; letter-spacing:2.5px; color:var(--muted); transition:color 0.3s; }
    .timer.recording { color:var(--danger); }
    .bottom { width:100%; display:flex; flex-direction:column; gap:10px; }
    .btn-analyze { width:100%; padding:15px; border-radius:12px; border:none; background:var(--text); color:#fff; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; display:none; }
    .btn-analyze.visible { display:block; }
    .status-bar { display:flex; align-items:center; gap:8px; padding:10px 14px; background:var(--surface); border-radius:10px; font-size:12px; color:var(--muted); }
    .dot { width:6px; height:6px; border-radius:50%; background:var(--muted); flex-shrink:0; transition:background 0.3s; }
    .dot.active { background:var(--green); }
    .dot.error { background:var(--danger); }
    .dot.loading { background:var(--text); animation:blink .8s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* Profile screen */
    .profile-screen {
      position: fixed; inset: 0; background: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 40px; z-index: 200; padding: 40px;
    }
    .profile-screen.hidden { display: none; }
    .profile-title { font-size: 22px; font-weight: 500; text-align: center; }
    .profile-title span { color: #aaa; font-weight: 300; }
    .profile-subtitle { font-size: 14px; color: #aaa; margin-top: -32px; }
    .profile-choices { display: flex; gap: 32px; }
    .profile-btn {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      background: none; border: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .profile-btn:active .avatar { transform: scale(0.93); }
    .avatar {
      width: 72px; height: 72px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 500; color: #fff;
      transition: transform 0.12s;
    }
    .avatar-n { background: #4f46e5; }
    .avatar-c { background: #db2777; }
    .profile-name { font-size: 14px; font-weight: 500; color: #1c1c1c; }

    /* Avatar in header */
    .header-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 500; color: #fff;
      cursor: pointer; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.75);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }
    .overlay.active { display: flex; }

    /* Spinner arc */
    .spinner {
      width: 64px;
      height: 64px;
      position: relative;
    }
    .spinner svg {
      animation: spin 1.2s cubic-bezier(0.4,0,0.2,1) infinite;
    }
    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .spinner-arc {
      fill: none;
      stroke: #1c1c1c;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 120 200;
      animation: arc 1.2s cubic-bezier(0.4,0,0.2,1) infinite;
    }
    @keyframes arc {
      0%   { stroke-dashoffset: 0; }
      50%  { stroke-dashoffset: -80; }
      100% { stroke-dashoffset: -200; }
    }

    /* Typing text */
    .overlay-text {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: #1c1c1c;
      letter-spacing: 0.5px;
      min-height: 20px;
      text-align: center;
    }
    .overlay-text::after {
      content: '▎';
      animation: cursor 0.8s step-end infinite;
    }
    @keyframes cursor { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>
<!-- Profile screen -->
<div class="profile-screen" id="profileScreen">
  <div>
    <div class="profile-title">Ponk <span>Note</span></div>
  </div>
  <div class="profile-subtitle">Qui êtes-vous ?</div>
  <div class="profile-choices">
    <button class="profile-btn" onclick="selectProfile('Nicolas')">
      <div class="avatar avatar-n">N</div>
      <span class="profile-name">Nicolas</span>
    </button>
    <button class="profile-btn" onclick="selectProfile('Carmen')">
      <div class="avatar avatar-c">C</div>
      <span class="profile-name">Carmen</span>
    </button>
  </div>
</div>

<div class="app">
  <header>
    <span class="logo-text">Ponk <span>Note</span></span>
    <div class="header-avatar" id="headerAvatar" onclick="changeProfile()"></div>
  </header>
  <div class="recorder">
    <div class="title-field">
      <input type="text" id="title" placeholder="Titre (optionnel)…" />
    </div>
    <div class="btn-zone">
      <button class="record-btn" id="recordBtn" onclick="toggleRecording()">
        <div class="pulse-ring pulse-ring-1"></div>
        <div class="pulse-ring pulse-ring-2"></div>
        <svg class="power-svg" viewBox="0 0 100 100">
          <path class="power-ring" d="M 30 22 A 32 32 0 1 0 70 22"/>
          <line class="power-line" x1="50" y1="10" x2="50" y2="42"/>
        </svg>
        <span class="btn-label" id="btnLabel">Appuyer</span>
      </button>
      <div class="timer" id="timer">00:00:00</div>
    </div>
    <div class="bottom">
      <button class="btn-analyze" id="btnAnalyze" onclick="analyze()">Analyser →</button>
      <div class="status-bar">
        <div class="dot" id="dot"></div>
        <span id="status">Prêt à enregistrer</span>
      </div>
    </div>
  </div>
</div>
<script>
  let recorder=null, chunks=[], blob=null, interval=null, seconds=0, recording=false;

  function toggleRecording() {
    if (!recording) startRec(); else stopRec();
  }

  async function startRec() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      chunks=[];
      recorder = new MediaRecorder(stream);
      recorder.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
      recorder.onstop = () => {
        blob = new Blob(chunks, {type:'audio/webm'});
        stream.getTracks().forEach(t=>t.stop());
        setStatus('active', 'Prêt — '+fmt(seconds));
        document.getElementById('btnAnalyze').classList.add('visible');
      };
      recorder.start(500);
      recording=true;
      seconds=0;
      interval = setInterval(()=>{ seconds++; tick(); }, 1000);
      document.getElementById('recordBtn').classList.add('is-recording');
      document.getElementById('btnLabel').textContent='Stop';
      document.getElementById('timer').classList.add('recording');
      setStatus('loading','Enregistrement en cours…');
    } catch(e) { setStatus('error','Micro inaccessible'); }
  }

  function stopRec() {
    recorder.stop(); recording=false; clearInterval(interval);
    document.getElementById('recordBtn').classList.remove('is-recording');
    document.getElementById('btnLabel').textContent='Appuyer';
    document.getElementById('timer').classList.remove('recording');
  }

  function tick() {
    const h=String(Math.floor(seconds/3600)).padStart(2,'0');
    const m=String(Math.floor((seconds%3600)/60)).padStart(2,'0');
    const s=String(seconds%60).padStart(2,'0');
    document.getElementById('timer').textContent=h+':'+m+':'+s;
  }

  const STEPS = [
    'Transcription en cours…',
    'Analyse du contexte…',
    'Identification des thèmes…',
    'Génération du résumé…',
    'Extraction des actions…',
    'Finalisation…'
  ];
  let stepInterval = null;

  function showOverlay() {
    const overlay = document.getElementById('overlay');
    const text = document.getElementById('overlayText');
    overlay.classList.add('active');
    let i = 0;
    text.textContent = STEPS[0];
    stepInterval = setInterval(() => {
      i = (i + 1) % STEPS.length;
      text.textContent = STEPS[i];
    }, 1800);
  }

  function hideOverlay() {
    document.getElementById('overlay').classList.remove('active');
    if (stepInterval) clearInterval(stepInterval);
  }

  async function analyze() {
    if(!blob) return;
    document.getElementById('btnAnalyze').disabled=true;
    showOverlay();
    setStatus('loading','Analyse en cours…');
    const title = document.getElementById('title').value||'';
    const now = new Date();
    const datetime = now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+' à '+now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    const formData = new FormData();
    formData.append('audio', blob, 'rec.webm');
    formData.append('title', title);
    formData.append('duration', fmt(seconds));
    formData.append('datetime', datetime);
    try {
      const res = await fetch('/api/analyze', {method:'POST', body:formData});
      if(!res.ok) throw new Error('Erreur '+res.status);
      const data = await res.json();
      // Store audio as base64
      // Store blob as object URL in sessionStorage workaround
      localStorage.setItem('ponk_result', JSON.stringify(data));
      localStorage.setItem('ponk_meta', JSON.stringify({title, duration:fmt(seconds), datetime}));
      const reader = new FileReader();
      reader.onload = () => {
        localStorage.setItem('ponk_audio', reader.result);
        window.location.href = '/results.html';
      };
      reader.readAsDataURL(blob);
    } catch(e) {
      hideOverlay();
      setStatus('error', e.message);
      document.getElementById('btnAnalyze').disabled=false;
    }
  }

  function fmt(s) {
    const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
    if(h>0) return h+'h '+m+'m';
    if(m>0) return m+'m '+sec+'s';
    return sec+'s';
  }

  function setStatus(type, text) {
    document.getElementById('dot').className='dot'+(type?' '+type:'');
    document.getElementById('status').textContent=text;
  }
</script>
  <!-- Loading overlay -->
  <div class="overlay" id="overlay">
    <div class="spinner">
      <svg viewBox="0 0 64 64" width="64" height="64">
        <circle class="spinner-arc" cx="32" cy="32" r="28"/>
      </svg>
    </div>
    <div class="overlay-text" id="overlayText"></div>
  </div>
</body>
</html>
