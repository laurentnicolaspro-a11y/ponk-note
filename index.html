<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ponk Note</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f4f4f4;
      --border: #e8e8e8;
      --text: #1c1c1c;
      --muted: #aaaaaa;
      --danger: #e02020;
      --green: #16a34a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%; height: 100dvh;
      overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: flex; flex-direction: column;
      height: 100%; height: 100dvh;
      max-width: 430px; margin: 0 auto;
      padding: env(safe-area-inset-top, 0px) 24px env(safe-area-inset-bottom, 16px);
    }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0 16px; flex-shrink: 0;
    }
    .logo-text { font-size: 15px; font-weight: 500; letter-spacing: -0.2px; }
    .logo-text span { color: var(--muted); font-weight: 300; }
    #headerMeta { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }

    .view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .view.active { display: flex; }

    /* ── RECORDER ── */
    .recorder {
      display: flex; flex-direction: column; flex: 1;
      align-items: center; justify-content: space-between;
      padding: 12px 0 8px;
    }

    .title-field { width: 100%; flex-shrink: 0; }
    .title-field input {
      width: 100%; background: none; border: none;
      border-bottom: 1px solid var(--border);
      padding: 10px 0; font-family: 'DM Sans', sans-serif;
      font-size: 15px; color: var(--text); outline: none;
      transition: border-color 0.2s;
    }
    .title-field input:focus { border-color: var(--text); }
    .title-field input::placeholder { color: var(--muted); }

    .btn-zone {
      display: flex; flex-direction: column;
      align-items: center; gap: 24px;
      flex: 1; justify-content: center;
    }

    .record-btn {
      width: 176px; height: 176px; border-radius: 50%;
      border: none; background: none; cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      transition: transform 0.12s;
      -webkit-tap-highlight-color: transparent;
      position: relative; user-select: none;
    }
    .record-btn:active { transform: scale(0.95); }

    .power-svg { width: 140px; height: 140px; transition: all 0.3s; }
    .power-ring { fill: none; stroke: var(--text); stroke-width: 8; stroke-linecap: round; transition: stroke 0.3s; }
    .power-line { fill: none; stroke: var(--text); stroke-width: 8; stroke-linecap: round; transition: stroke 0.3s; }
    .record-btn.is-recording .power-ring { stroke: var(--danger); }
    .record-btn.is-recording .power-line { stroke: var(--danger); }

    .pulse-ring {
      position: absolute; border-radius: 50%;
      border: 2px solid var(--danger); opacity: 0; pointer-events: none;
    }
    .pulse-ring-1 { inset: -16px; }
    .pulse-ring-2 { inset: -32px; }
    .record-btn.is-recording .pulse-ring-1 { animation: pulse-out 1.6s ease-out infinite; }
    .record-btn.is-recording .pulse-ring-2 { animation: pulse-out 1.6s ease-out 0.5s infinite; }

    @keyframes pulse-out {
      0%   { opacity: 0.5; transform: scale(0.95); }
      100% { opacity: 0;   transform: scale(1.08); }
    }

    .btn-label {
      font-size: 10px; font-weight: 500;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--muted); transition: color 0.3s;
    }
    .record-btn.is-recording .btn-label { color: var(--danger); }

    .timer {
      font-family: 'DM Mono', monospace; font-size: 17px;
      letter-spacing: 2.5px; color: var(--muted); transition: color 0.3s;
    }
    .timer.recording { color: var(--danger); }

    .bottom-section {
      width: 100%; display: flex; flex-direction: column;
      gap: 10px; flex-shrink: 0;
    }

    .btn-analyze {
      width: 100%; padding: 15px; border-radius: 12px; border: none;
      background: var(--text); color: var(--bg);
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, transform 0.12s; display: none;
    }
    .btn-analyze.visible { display: block; }
    .btn-analyze:active { transform: scale(0.98); }
    .btn-analyze:disabled { opacity: 0.3; cursor: not-allowed; }

    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; background: var(--surface);
      border-radius: 10px; font-size: 12px; color: var(--muted);
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0; transition: background 0.3s;
    }
    .status-dot.active  { background: var(--green); }
    .status-dot.error   { background: var(--danger); }
    .status-dot.loading { background: var(--text); animation: blink 0.8s ease-in-out infinite; }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    /* ── RESULTS ── */
    .results-view {
      display: flex; flex-direction: column; flex: 1;
      overflow: hidden; padding: 14px 0 0; gap: 10px;
    }

    .results-nav {
      flex-wrap: wrap; gap: 4px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; padding-bottom: 12px; border-bottom: 1px solid var(--border);
    }

    .btn-back {
      background: none; border: none; font-family: 'DM Sans', sans-serif;
      font-size: 13px; color: var(--muted); cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .meta-info { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }

    .results-scroll {
      flex: 1; overflow-y: auto; display: flex; flex-direction: column;
      gap: 8px; -webkit-overflow-scrolling: touch; padding-bottom: 8px;
    }

    .result-block {
      border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; flex-shrink: 0;
    }

    .result-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; cursor: pointer; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .result-header:active { background: var(--surface); }

    .result-label {
      font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 1px; color: var(--muted);
    }

    .result-controls { display: flex; align-items: center; gap: 8px; }

    .chevron { font-size: 10px; color: var(--muted); transition: transform 0.2s; }
    .result-block.collapsed .chevron { transform: rotate(-90deg); }
    .result-block.collapsed .result-body { display: none; }

    .result-body { padding: 0 14px 14px; border-top: 1px solid var(--border); }

    /* Résumé structuré */
    .summary-section { padding-top: 12px; }
    .summary-section + .summary-section { padding-top: 10px; border-top: 1px solid var(--border); margin-top: 10px; }
    .summary-section-title {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--muted); margin-bottom: 6px;
    }
    .summary-section p {
      font-size: 14px; line-height: 1.7; color: var(--text);
    }

    .result-body ul {
      list-style: none; display: flex; flex-direction: column;
      gap: 6px; padding-top: 10px;
    }
    .result-body ul li {
      display: flex; gap: 8px; padding: 9px 11px;
      background: var(--surface); border-radius: 8px;
      font-size: 13px; line-height: 1.6; color: var(--text);
    }
    .result-body ul li::before { content: '—'; color: var(--muted); flex-shrink: 0; }

    /* Audio player */
    .audio-block {
      border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; flex-shrink: 0;
    }

    .audio-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px;
    }

    .audio-player {
      padding: 0 14px 14px;
      border-top: 1px solid var(--border);
    }

    .audio-controls {
      display: flex; align-items: center; gap: 12px;
      padding-top: 12px;
    }

    .play-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--text); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s;
    }
    .play-btn:active { transform: scale(0.93); }
    .play-btn svg { fill: white; }

    .audio-progress-wrap { flex: 1; display: flex; flex-direction: column; gap: 4px; }

    .progress-bar {
      width: 100%; height: 20px; cursor: pointer;
      position: relative; display: flex; align-items: center;
      touch-action: none;
    }
    .progress-track {
      width: 100%; height: 3px; background: var(--border);
      border-radius: 2px; position: relative; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--text);
      border-radius: 2px; width: 0%;
    }
    .progress-thumb {
      position: absolute; top: 50%; left: 0%;
      transform: translate(-50%, -50%);
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--text); pointer-events: none;
      transition: transform 0.1s;
    }
    .progress-bar:active .progress-thumb { transform: translate(-50%, -50%) scale(1.3); }

    .audio-times {
      display: flex; justify-content: space-between;
      font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted);
    }

    .copy-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 3px 10px; border-radius: 5px; font-size: 11px;
      font-family: 'DM Sans', sans-serif; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .copy-btn.copied { color: var(--green); border-color: var(--green); }

    .skeleton-line {
      height: 11px;
      background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
      background-size: 200% 100%; border-radius: 4px;
      animation: shimmer 1.4s infinite; margin-top: 12px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>
<div class="app">

  <header>
    <span class="logo-text">Ponk <span>Note</span></span>
    <span id="headerMeta"></span>
  </header>

  <!-- View 1 : Enregistrement -->
  <div class="view active" id="viewRecorder">
    <div class="recorder">

      <div class="title-field">
        <input type="text" id="meetingTitle" placeholder="Titre de la réunion…" />
      </div>

      <div class="btn-zone">
        <button class="record-btn" id="recordBtn" onclick="toggleRecording()">
          <div class="pulse-ring pulse-ring-1"></div>
          <div class="pulse-ring pulse-ring-2"></div>
          <svg class="power-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path class="power-ring" d="M 30 22 A 32 32 0 1 0 70 22"/>
            <line class="power-line" x1="50" y1="10" x2="50" y2="42"/>
          </svg>
          <span class="btn-label" id="btnLabel">Appuyer</span>
        </button>
        <div class="timer" id="timer">00:00:00</div>
      </div>

      <div class="bottom-section">
        <button class="btn-analyze" id="btnAnalyze" onclick="analyzeRecording()">
          Analyser la réunion →
        </button>
        <div class="status-bar">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">Prêt à enregistrer</span>
        </div>
      </div>

    </div>
  </div>

  <!-- View 2 : Résultats -->
  <div class="view" id="viewResults">
    <div class="results-view">
      <div class="results-nav">
        <button class="btn-back" onclick="backToRecorder()">← Nouveau</button>
        <span class="meta-info" id="metaDuration"></span>
        <span class="meta-info" id="metaDatetime" style="font-size:11px;color:var(--muted)"></span>
      </div>

      <div class="results-scroll">

        <!-- Résumé structuré -->
        <div class="result-block" id="blockSummary">
          <div class="result-header" onclick="toggleBlock('blockSummary')">
            <span class="result-label">Résumé</span>
            <div class="result-controls">
              <button class="copy-btn" onclick="copyContent('summaryContent',this);event.stopPropagation()">Copier</button>
              <span class="chevron">▾</span>
            </div>
          </div>
          <div class="result-body" id="summaryContent"></div>
        </div>

        <!-- Points d'action -->
        <div class="result-block" id="blockActions">
          <div class="result-header" onclick="toggleBlock('blockActions')">
            <span class="result-label">Points d'action</span>
            <div class="result-controls">
              <button class="copy-btn" onclick="copyContent('actionsContent',this);event.stopPropagation()">Copier</button>
              <span class="chevron">▾</span>
            </div>
          </div>
          <div class="result-body" id="actionsContent"></div>
        </div>

        <!-- Lecteur audio -->
        <div class="audio-block" id="audioBlock" style="display:none">
          <div class="audio-header">
            <span class="result-label">Écouter</span>
          </div>
          <div class="audio-player">
            <div class="audio-controls">
              <button class="play-btn" id="playBtn" onclick="togglePlay()">
                <svg id="playIcon" viewBox="0 0 24 24" width="16" height="16">
                  <path d="M8 5v14l11-7z"/>
                </svg>
              </button>
              <div class="audio-progress-wrap">
                <div class="progress-bar" id="progressBar">
                  <div class="progress-track">
                    <div class="progress-fill" id="progressFill"></div>
                  </div>
                  <div class="progress-thumb" id="progressThumb"></div>
                </div>
                <div class="audio-times">
                  <span id="currentTime">0:00</span>
                  <span id="totalTime">0:00</span>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

</div>

<script>
  let mediaRecorder = null;
  let audioChunks   = [];
  let audioBlob     = null;
  let audioUrl      = null;
  let audioEl       = null;
  let timerInterval = null;
  let seconds       = 0;
  let isRecording   = false;

  function toggleRecording() {
    if (!isRecording) startRecording();
    else stopRecording();
  }

  function startTimer() {
    seconds = 0;
    timerInterval = setInterval(() => {
      seconds++;
      const h = String(Math.floor(seconds/3600)).padStart(2,'0');
      const m = String(Math.floor((seconds%3600)/60)).padStart(2,'0');
      const s = String(seconds%60).padStart(2,'0');
      document.getElementById('timer').textContent = `${h}:${m}:${s}`;
    }, 1000);
  }

  function stopTimer() { clearInterval(timerInterval); }

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        stream.getTracks().forEach(t => t.stop());
        setStatus('active', `Prêt — ${formatDuration(seconds)}`);
        document.getElementById('btnAnalyze').classList.add('visible');
      };
      mediaRecorder.start(500);
      isRecording = true;
      startTimer();
      document.getElementById('recordBtn').classList.add('is-recording');
      document.getElementById('btnLabel').textContent = 'Stop';
      document.getElementById('timer').classList.add('recording');
      setStatus('loading', 'Enregistrement en cours…');
    } catch(e) {
      setStatus('error', 'Micro inaccessible — vérifiez les permissions');
    }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
      isRecording = false;
      stopTimer();
      document.getElementById('recordBtn').classList.remove('is-recording');
      document.getElementById('btnLabel').textContent = 'Appuyer';
      document.getElementById('timer').classList.remove('recording');
    }
  }

  async function analyzeRecording() {
    if (!audioBlob) return;
    document.getElementById('btnAnalyze').disabled = true;
    const title    = document.getElementById('meetingTitle').value || 'Réunion sans titre';
    const duration = formatDuration(seconds);
    const now = new Date();
    const dateStr = now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    const timeStr = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    const datetime = dateStr + ' à ' + timeStr;

    showView('viewResults');
    document.getElementById('metaDuration').textContent = duration;
    document.getElementById('metaDatetime').textContent = datetime;
    document.getElementById('headerMeta').textContent   = title;
    showSkeleton('summaryContent');
    showSkeleton('actionsContent');

    // Setup audio player
    if (audioUrl) URL.revokeObjectURL(audioUrl);
    audioUrl = URL.createObjectURL(audioBlob);
    audioEl  = new Audio(audioUrl);
    audioEl.ontimeupdate = updateProgress;
    audioEl.onended = () => {
      document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
    };
    audioEl.onloadedmetadata = () => {
      document.getElementById('totalTime').textContent = formatAudioTime(audioEl.duration);
    };
    document.getElementById('audioBlock').style.display = 'block';

    const formData = new FormData();
    formData.append('audio', audioBlob, 'recording.webm');
    formData.append('title', title);
    formData.append('duration', duration);
    formData.append('datetime', datetime);

    try {
      const res  = await fetch('/api/analyze', { method: 'POST', body: formData });
      if (!res.ok) throw new Error(`Erreur ${res.status}`);
      const data = await res.json();

      // Résumé structuré
      renderSummary(data);

      // Actions
      const actions = data.actions || [];
      document.getElementById('actionsContent').innerHTML = actions.length
        ? `<ul>${actions.map(a=>`<li>${a}</li>`).join('')}</ul>`
        : `<p style="color:var(--muted);padding-top:12px;font-size:14px">Aucun point d'action identifié.</p>`;

    } catch(e) {
      document.getElementById('summaryContent').innerHTML =
        `<p style="color:var(--danger);padding-top:12px;font-size:14px">${e.message}</p>`;
    }
  }

  function renderSummary(data) {
    const el = document.getElementById('summaryContent');
    let html = '';

    if (data.participants && data.participants.length) {
      html += `<div class="summary-section">
        <div class="summary-section-title">👥 Participants</div>
        <p>${data.participants.join(', ')}</p>
      </div>`;
    }

    if (data.subjects && data.subjects.length) {
      html += `<div class="summary-section">
        <div class="summary-section-title">📋 Sujets abordés</div>
        <p>${data.subjects.join('<br>')}</p>
      </div>`;
    }

    if (data.decisions && data.decisions.length) {
      html += `<div class="summary-section">
        <div class="summary-section-title">✅ Décisions prises</div>
        <p>${data.decisions.join('<br>')}</p>
      </div>`;
    }

    if (data.summary) {
      html += `<div class="summary-section">
        <div class="summary-section-title">📝 Synthèse</div>
        <p>${data.summary.replace(/\n/g,'<br>')}</p>
      </div>`;
    }

    el.innerHTML = html || `<p style="color:var(--muted);padding-top:12px;font-size:14px">Aucune information extraite.</p>`;
  }

  // Audio player
  function togglePlay() {
    if (!audioEl) return;
    if (audioEl.paused) {
      audioEl.play();
      document.getElementById('playIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    } else {
      audioEl.pause();
      document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
    }
  }

  function updateProgress() {
    if (!audioEl || !audioEl.duration) return;
    const pct = (audioEl.currentTime / audioEl.duration) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressThumb').style.left = pct + '%';
    document.getElementById('currentTime').textContent = formatAudioTime(audioEl.currentTime);
  }

  function getSeekPct(clientX) {
    const bar = document.getElementById('progressBar');
    const rect = bar.getBoundingClientRect();
    return Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
  }

  function seekTo(pct) {
    if (!audioEl || !audioEl.duration) return;
    audioEl.currentTime = pct * audioEl.duration;
    document.getElementById('progressFill').style.width = (pct * 100) + '%';
    document.getElementById('progressThumb').style.left = (pct * 100) + '%';
    document.getElementById('currentTime').textContent = formatAudioTime(audioEl.currentTime);
  }

  // Setup drag on progress bar
  function initProgressBar() {
    const bar = document.getElementById('progressBar');
    let dragging = false;

    // Mouse
    bar.addEventListener('mousedown', e => { dragging = true; seekTo(getSeekPct(e.clientX)); });
    document.addEventListener('mousemove', e => { if (dragging) seekTo(getSeekPct(e.clientX)); });
    document.addEventListener('mouseup', () => { dragging = false; });

    // Touch
    bar.addEventListener('touchstart', e => { dragging = true; seekTo(getSeekPct(e.touches[0].clientX)); e.preventDefault(); }, { passive: false });
    bar.addEventListener('touchmove', e => { if (dragging) seekTo(getSeekPct(e.touches[0].clientX)); e.preventDefault(); }, { passive: false });
    bar.addEventListener('touchend', () => { dragging = false; });
  }

  initProgressBar();

  function formatAudioTime(s) {
    const m = Math.floor(s/60);
    const sec = Math.floor(s%60);
    return `${m}:${String(sec).padStart(2,'0')}`;
  }

  function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function backToRecorder() {
    if (audioEl) { audioEl.pause(); audioEl = null; }
    if (audioUrl) { URL.revokeObjectURL(audioUrl); audioUrl = null; }
    audioBlob = null; audioChunks = []; seconds = 0; isRecording = false;
    document.getElementById('timer').textContent = '00:00:00';
    document.getElementById('timer').classList.remove('recording');
    document.getElementById('btnAnalyze').classList.remove('visible');
    document.getElementById('btnAnalyze').disabled = false;
    document.getElementById('meetingTitle').value = '';
    document.getElementById('headerMeta').textContent = '';
    document.getElementById('recordBtn').classList.remove('is-recording');
    document.getElementById('btnLabel').textContent = 'Appuyer';
    document.getElementById('audioBlock').style.display = 'none';
    document.getElementById('progressFill').style.width = '0%';
    setStatus('', 'Prêt à enregistrer');
    showView('viewRecorder');
  }

  function formatDuration(s) {
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
    if (h > 0) return `${h}h ${m}m`;
    if (m > 0) return `${m}m ${sec}s`;
    return `${sec}s`;
  }

  function setStatus(type, text) {
    document.getElementById('statusDot').className = 'status-dot' + (type ? ' '+type : '');
    document.getElementById('statusText').textContent = text;
  }

  function showSkeleton(id) {
    document.getElementById(id).innerHTML = `
      <div class="skeleton-line" style="width:88%"></div>
      <div class="skeleton-line" style="width:72%"></div>
      <div class="skeleton-line" style="width:80%"></div>
      <div class="skeleton-line" style="width:58%"></div>`;
  }

  function toggleBlock(id) { document.getElementById(id).classList.toggle('collapsed'); }

  function copyContent(id, btn) {
    navigator.clipboard.writeText(
      document.getElementById(id).innerText || document.getElementById(id).textContent
    ).then(() => {
      btn.textContent = '✓ Copié';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copier'; btn.classList.remove('copied'); }, 2000);
    });
  }
</script>
</body>
</html>
