<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ponk · Enregistrer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Audiowide&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background:rgba(0,0,0,0.2); border-radius:10px; }
    ::-webkit-scrollbar-thumb { background:rgba(0,220,255,0.25); border-radius:10px; }
    ::-webkit-scrollbar-thumb:hover { background:rgba(0,220,255,0.45); }

    :root {
      --grad-idle: linear-gradient(145deg, #dce8f8 0%, #e8d8f0 40%, #f5e6d8 100%);
      --grad-rec:  linear-gradient(145deg, #f8dcd8 0%, #f0d0c0 40%, #f8e8d0 100%);
      --grad-asst: linear-gradient(145deg, #d0d8f8 0%, #d8c8f0 40%, #c8d8f0 100%);
      --glass: rgba(255,255,255,0.45);
      --glass-border: rgba(255,255,255,0.7);
      --text: #2a2a3a;
      --muted: rgba(42,42,58,0.5);
      --accent: #4a7fd4;
      --danger: #e05555;
      --green: #3db87a;
      --surface: rgba(255,255,255,0.55);
    }

    html, body {
      height:100%; height:100dvh; overflow:hidden;
      font-family:'Inter', -apple-system, sans-serif;
      color:#ffffff;
    }

    /* ── Background ── */
    #bg {
      position:fixed; inset:0; z-index:-1;
      background: var(--grad-idle);
      transition: background 1.2s ease;
    }
    #bg::before {
      content:''; position:absolute; inset:0;
      backdrop-filter:blur(0px);
    }

    /* Noise overlay */
    #bg::after {
      content:''; position:absolute; inset:0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity:0.4; pointer-events:none;
    }

    /* ── Page principale dark ── */
    .app {
      position:fixed; inset:0; z-index:1;
      display:flex; flex-direction:column;
      background: radial-gradient(ellipse at 20% 50%, #1a3060 0%, #101e40 40%, #080f28 100%);
      overflow:hidden;
    }
    .app.hidden { display:none !important; }

    /* Header */
    .main-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 28px; flex-shrink:0; z-index:10;
      border-bottom:1px solid rgba(0,220,255,0.1);
      background:rgba(5,4,18,0.6); backdrop-filter:blur(12px);
    }
    .main-header-logo { display:flex; align-items:baseline; gap:4px; }
    .logo-ponk {
      font-family:'Audiowide',sans-serif; font-size:20px;
      color:#00dcff; text-shadow:0 0 16px rgba(0,220,255,0.8), 0 0 40px rgba(0,220,255,0.3);
    }
    .logo-note {
      font-family:'Audiowide',sans-serif; font-size:20px;
      color:#fff; text-shadow:0 0 16px rgba(0,220,255,0.5), 0 0 30px rgba(0,220,255,0.2);
    }
    .main-header-right { display:flex; align-items:center; gap:10px; }
    .header-avatar {
      width:36px; height:36px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-family:'Audiowide',sans-serif;
      font-size:13px; font-weight:400; color:#fff;
      cursor:pointer; flex-shrink:0;
      border:1.5px solid rgba(0,220,255,0.4);
      box-shadow:0 0 14px rgba(0,220,255,0.25);
      transition:transform 0.1s, box-shadow 0.2s;
    }
    .header-avatar:active { transform:scale(0.93); }
    .header-avatar:hover { box-shadow:0 0 20px rgba(0,220,255,0.5); }
    .main-add-btn {
      width:36px; height:36px; border-radius:50%;
      background:rgba(0,220,255,0.08); border:1.5px solid rgba(0,220,255,0.4);
      color:#00dcff; font-size:20px; font-weight:300;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all 0.2s;
      box-shadow:0 0 10px rgba(0,220,255,0.15);
      opacity:0.4; pointer-events:none;
    }
    .main-add-btn.active {
      opacity:1; pointer-events:auto;
      box-shadow:0 0 16px rgba(0,220,255,0.4);
      border-color:rgba(0,220,255,0.7);
    }
    .main-add-btn:active { transform:scale(0.92); }
    .bottom-center-row { display:flex; align-items:center; gap:8px; }

    /* Stage principal */
    .main-stage {
      flex:1; position:relative;
      display:flex; overflow:hidden;
      background: radial-gradient(ellipse at 20% 50%, #1a3060 0%, #101e40 40%, #080f28 100%);
    }
    #neuroCanvas {
      position:absolute; inset:0; z-index:0; pointer-events:none;
    }

    /* Gauche : bouton micro */
    .stage-left {
      width:100%; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      position:relative; z-index:2; gap:20px;
    }


    /* ── Profile screen dark tech ── */
    .profile-screen {
      position:fixed; inset:0; z-index:9999;
      display:none; flex-direction:column;
      align-items:center; justify-content:center;
      gap:20px; padding:32px 28px;
      background: radial-gradient(ellipse at 30% 20%, #1a1040 0%, #0d0820 40%, #070514 100%);
      overflow:hidden;
    }
    .profile-screen.visible { display:flex; animation:fadeUp 0.5s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    #geoCanvas { position:absolute; inset:0; z-index:0; pointer-events:none; }
    .profile-screen::before {
      content:''; position:absolute; inset:0; z-index:0;
      background-image:
        linear-gradient(rgba(100,60,220,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100,60,220,0.07) 1px, transparent 1px);
      background-size:40px 40px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    }
    .profile-screen::after {
      content:''; position:absolute;
      width:500px; height:500px;
      top:50%; left:50%; transform:translate(-50%,-60%);
      background: radial-gradient(circle, rgba(120,60,255,0.12) 0%, transparent 70%);
      z-index:0; pointer-events:none;
    }
    .profile-content {
      position:relative; z-index:2;
      display:flex; flex-direction:column;
      align-items:center; gap:20px;
      width:100%; max-width:480px;
    }
    .profile-app-name {
      font-family:'Audiowide', sans-serif;
      font-size:28px; font-weight:400; letter-spacing:0.5px;
      display:flex; gap:10px; justify-content:center;
    }
    .profile-app-name .ponk { color:#00dcff; text-shadow:0 0 20px rgba(0,220,255,0.8), 0 0 50px rgba(0,220,255,0.3); }
    .profile-app-name .note { color:#fff; text-shadow:0 0 20px rgba(0,220,255,0.6), 0 0 40px rgba(0,220,255,0.2); }
    .profile-welcome { text-align:center; }
    .profile-welcome p:first-child { font-size:18px; font-weight:600; margin-bottom:4px; color:#fff; }
    .profile-welcome p:last-child { font-size:13px; color:rgba(180,160,255,0.7); }
    .profile-input-wrap { width:100%; display:flex; flex-direction:column; gap:10px; }
    .profile-input {
      width:100%; padding:13px 16px; border-radius:10px;
      border:1.5px solid rgba(0,200,255,0.55);
      background: rgba(0,180,255,0.12);
      font-family:'Inter', sans-serif; font-size:15px; color:#fff;
      outline:none; text-align:center;
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    .profile-input:focus { border-color:rgba(0,220,255,1); background:rgba(0,180,255,0.18); box-shadow:0 0 0 2px rgba(0,220,255,0.2); }
    .profile-input::placeholder { color:rgba(160,220,255,0.55); }
    .profile-input:-webkit-autofill,
    .profile-input:-webkit-autofill:hover,
    .profile-input:-webkit-autofill:focus {
      -webkit-text-fill-color:#fff;
      -webkit-box-shadow:0 0 0 1000px rgba(0,140,200,0.25) inset;
      transition:background-color 5000s ease-in-out 0s;
      caret-color:#fff;
    }
    .profile-prefs { width:100%; display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
    .pref-col { display:flex; flex-direction:column; align-items:center; gap:8px; }
    .pref-col-label { font-family:'Audiowide',sans-serif; font-size:10px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:rgba(180,160,255,0.7); }
    .pref-options { display:flex; flex-direction:column; gap:5px; width:100%; }
    .pref-btn {
      padding:7px 10px; border-radius:8px;
      background:rgba(255,255,255,0.05); border:1px solid rgba(0,220,255,0.25);
      font-family:'Inter',sans-serif; font-size:11px; font-weight:500;
      color:rgba(200,190,255,0.75); cursor:pointer; text-align:center;
      transition:all 0.15s;
    }
    .pref-btn.active { background:rgba(0,220,255,0.15); border-color:rgba(0,220,255,0.7); color:#00dcff; box-shadow:0 0 12px rgba(0,220,255,0.2); }
    .profile-submit {
      width:100%; padding:14px; border-radius:10px; border:none;
      background:linear-gradient(90deg, rgba(100,40,220,0.9), rgba(0,160,255,0.9));
      color:#fff; font-family:'Audiowide',sans-serif;
      font-size:17px; font-weight:700; letter-spacing:2px;
      cursor:pointer; text-transform:uppercase; position:relative; overflow:hidden;
      box-shadow:0 0 24px rgba(0,180,255,0.3), 0 0 0 1px rgba(0,220,255,0.3);
      transition:box-shadow 0.2s, transform 0.1s;
    }
    .profile-submit::before {
      content:''; position:absolute; inset:0;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transform:translateX(-100%); animation:shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer { 0%{transform:translateX(-100%)} 60%,100%{transform:translateX(100%)} }
    .profile-submit:active { transform:scale(0.98); }

  </style>
</head>
<body>
<div id="bg"></div>

<!-- Profile screen -->
<div class="profile-screen" id="profileScreen">
  <canvas id="geoCanvas"></canvas>
  <div id="portalOrb" style="position:absolute;border-radius:50%;background:radial-gradient(circle,#fff 0%,#00dcff 30%,rgba(0,180,255,0.6) 60%,transparent 100%);box-shadow:0 0 40px 20px rgba(0,220,255,0.6),0 0 80px 40px rgba(0,180,255,0.3);transform:translate(-50%,-50%) scale(0);pointer-events:none;z-index:10;width:20px;height:20px;left:50%;top:50%;transition:none"></div>
  <div class="profile-content">
    <div class="profile-logo">
      <div class="profile-app-name"><span class="ponk">Ponk</span><span class="note">Note</span></div>
    </div>
    <div class="profile-welcome">
      <p>Bienvenue !</p>
      <p>Comment tu t'appelles ?</p>
    </div>
    <div class="profile-input-wrap">
      <input type="text" id="profileName" class="profile-input" placeholder="Ton prénom" maxlength="20" autocomplete="off" autocapitalize="words" />
      <input type="text" id="profileEmail" class="profile-input" placeholder="Ton adresse email" autocomplete="email" inputmode="email" />
      <input type="text" id="profileVille" class="profile-input" placeholder="Ta ville (ex: Cambrai)" autocomplete="address-level2" />

      <div class="profile-prefs">
        <div class="pref-col">
          <div class="pref-col-label">Mail</div>
          <div class="pref-options" id="prefMail">
            <div class="pref-btn active" data-value="gmail">Gmail</div>
            <div class="pref-btn" data-value="outlook">Outlook</div>
            <div class="pref-btn" data-value="yahoo">Yahoo</div>
          </div>
        </div>
        <div class="pref-col">
          <div class="pref-col-label">Agenda</div>
          <div class="pref-options" id="prefCal">
            <div class="pref-btn active" data-value="google">Google</div>
            <div class="pref-btn" data-value="outlook">Outlook</div>
            <div class="pref-btn" data-value="apple">Apple</div>
          </div>
        </div>
        <div class="pref-col">
          <div class="pref-col-label">Maps</div>
          <div class="pref-options" id="prefMaps">
            <div class="pref-btn active" data-value="google">Google Maps</div>
            <div class="pref-btn" data-value="waze">Waze</div>
            <div class="pref-btn" data-value="apple">Apple Maps</div>
          </div>
        </div>
      </div>

      <button class="profile-submit" id="submitBtn" onclick="launchPortal()">Commencer</button>
    </div>
  </div>
</div>

<div class="app hidden" id="mainApp">

  <!-- Header -->
  <div class="main-header">
    <div class="main-header-logo">
      <span class="logo-ponk">Ponk</span><span class="logo-note"> Note</span>
    </div>
    <div class="main-header-right">
      <div class="header-avatar" id="headerAvatar" onclick="goToLibrary()"></div>
    </div>
  </div>

  <!-- Zone principale : silhouette IA gauche + assistant droite -->
  <div class="main-stage">

    <!-- Canvas silhouette IA animée -->
    <canvas id="neuroCanvas"></canvas>

    <!-- Gauche : bouton micro flottant sur la silhouette -->
    <div class="stage-left">
      <div class="power-wrap" id="powerWrap">
        <svg class="spiky-ring" id="spikyRing" width="230" height="230" viewBox="0 0 220 220">
          <path id="spikyPath" fill="none" stroke="rgba(0,220,255,0.5)" stroke-width="1.5"/>
        </svg>
        <button class="record-btn" id="recordBtn" onclick="toggleRecording()">
          <svg class="power-svg" viewBox="0 0 100 100">
            <path class="power-ring" d="M 30 22 A 32 32 0 1 0 70 22"/>
            <line class="power-line" x1="50" y1="10" x2="50" y2="42"/>
          </svg>
          <span class="btn-label" id="btnLabel">Enregistrer</span>
        </button>
      </div>
      <div class="timer" id="timer">00:00</div>
    </div>

  </div><!-- /main-stage -->

  <!-- Barre basse minimaliste -->
  <div class="main-bottom" style="justify-content:center;gap:16px;">
    <div class="status-pill">
      <div class="dot" id="dot"></div>
      <span id="status">Pret</span>
    </div>
    <button class="btn-analyze" id="btnAnalyze" onclick="analyze()">Analyser</button>
  </div>

</div><!-- /mainApp -->

<!-- Overlay -->
<div class="overlay" id="overlay">
  <div class="overlay-orbe-wrap">
    <canvas id="overlayCanvas" width="220" height="220"></canvas>
    <div class="overlay-orbe-center">
      <div>
        <div class="overlay-pct" id="overlayPct">0%</div>
        <div class="overlay-pct-label">traitement</div>
      </div>
    </div>
  </div>
  <div class="overlay-steps">
    <div class="overlay-step" data-step="0"><div class="overlay-step-dot"></div><span class="overlay-step-label">Transcription</span></div>
    <div class="overlay-step" data-step="1"><div class="overlay-step-dot"></div><span class="overlay-step-label">Analyse du contexte</span></div>
    <div class="overlay-step" data-step="2"><div class="overlay-step-dot"></div><span class="overlay-step-label">Identification des thèmes</span></div>
    <div class="overlay-step" data-step="3"><div class="overlay-step-dot"></div><span class="overlay-step-label">Génération du résumé</span></div>
    <div class="overlay-step" data-step="4"><div class="overlay-step-dot"></div><span class="overlay-step-label">Extraction des actions</span></div>
    <div class="overlay-step" data-step="5"><div class="overlay-step-dot"></div><span class="overlay-step-label">Finalisation</span></div>
    <div class="overlay-current" id="overlayText"></div>
  </div>
</div>

<script>
  function buildSpiky(n, r, spike, cx, cy) {
    let d = '';
    for (let i = 0; i < n * 2; i++) {
      const angle = (Math.PI / n) * i - Math.PI / 2;
      const radius = i % 2 === 0 ? r + spike : r;
      const x = cx + radius * Math.cos(angle);
      const y = cy + radius * Math.sin(angle);
      d += (i === 0 ? 'M' : 'L') + x.toFixed(2) + ',' + y.toFixed(2);
    }
    return d + 'Z';
  }
  document.getElementById('spikyPath').setAttribute('d', buildSpiky(32, 88, 8, 110, 110));
  let recorder=null, chunks=[], blob=null, interval=null, seconds=0, recording=false, uploadedFileName=null;
  let sessionId=null, segmentIndex=0, segmentFileNames=[], segmentInterval=null;

  async function checkQuota() {
    const profile = localStorage.getItem('ponk_profile') || 'user';
    try {
      const res = await fetch('/api/list?uid=' + encodeURIComponent(profile));
      const data = await res.json();
      const count = (data.files || []).filter(f => f.name && f.name !== '.emptyFolderPlaceholder').length;
      return count;
    } catch(e) { return 0; }
  }

  async function toggleRecording() {
    if (recording) { stopRec(); return; }
    const count = await checkQuota();
    if (count >= 5) {
      setStatus('error', 'Bibliothèque pleine (5/5) — supprime un enregistrement');
      document.getElementById('recordBtn').classList.add('is-blocked');
      setTimeout(() => document.getElementById('recordBtn').classList.remove('is-blocked'), 2000);
      return;
    }
    startRec();
  }

  async function startRec() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      chunks = [];
      blob = null;
      uploadedFileName = null;
      segmentFileNames = [];
      segmentIndex = 0;
      sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
      document.getElementById('btnAnalyze').classList.remove('visible');

      function createRecorder() {
        const rec = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus', audioBitsPerSecond: 16000 });
        rec.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
        rec.onstop = () => {
          const segBlob = new Blob(chunks, {type:'audio/webm'});
          chunks = [];
          if (!recording) {
            // Dernier segment — upload final puis affiche le bouton analyser
            uploadSegment(segBlob, true);
          } else {
            // Segment intermédiaire — upload silencieux
            uploadSegment(segBlob, false);
            // Démarrer le segment suivant
            segmentIndex++;
            recorder = createRecorder();
            recorder.start(500);
          }
        };
        return rec;
      }

      recorder = createRecorder();
      recorder.start(500);
      recording = true;
      seconds = 0;
      interval = setInterval(() => { seconds++; tick(); }, 1000);

      // Toutes les 10 minutes, couper le segment en cours et en démarrer un nouveau
      const SEGMENT_MS = 10 * 60 * 1000;
      segmentInterval = setInterval(() => {
        if (recording && recorder && recorder.state === 'recording') {
          recorder.stop(); // onstop va créer le suivant automatiquement
        }
      }, SEGMENT_MS);
      window.addEventListener('beforeunload', confirmQuit);
      
      document.getElementById('recordBtn').classList.add('is-recording');
      document.getElementById('powerWrap').classList.add('is-recording');
      
      document.getElementById('btnLabel').textContent = 'Appuyer pour arrêter';
      document.getElementById('timer').classList.add('recording');
      document.getElementById('spikyPath').setAttribute('stroke', 'rgba(224,85,85,0.45)');
      document.getElementById('bg').style.background = 'linear-gradient(145deg, #f8dcd8 0%, #f0d0c0 40%, #f8e8d0 100%)';
      setStatus('loading', 'Enregistrement…');
    } catch(e) { setStatus('error', 'Micro inaccessible'); }
  }

  function stopRec() {
    recording = false;
    clearInterval(interval);
    clearInterval(segmentInterval);
    window.removeEventListener('beforeunload', confirmQuit);
    
    setStatus('loading', 'Sauvegarde en cours…');
    if (recorder && recorder.state === 'recording') recorder.stop(); // déclenche onstop → uploadSegment(blob, true)
    document.getElementById('recordBtn').classList.remove('is-recording');
    document.getElementById('powerWrap').classList.remove('is-recording');
    
    document.getElementById('btnLabel').textContent = 'Appuyer pour enregistrer';
    document.getElementById('timer').classList.remove('recording');
    document.getElementById('spikyPath').setAttribute('stroke', 'rgba(74,127,212,0.35)');
    document.getElementById('bg').style.background = 'linear-gradient(145deg, #dce8f8 0%, #e8d8f0 40%, #f5e6d8 100%)';
  }

  async function uploadSegment(segBlob, isFinal) {
    if (!segBlob) return;
    const profile = localStorage.getItem('ponk_profile') || 'user';

    // Quota check uniquement sur le premier segment
    if (segmentIndex === 0) {
      try {
        const checkRes = await fetch('/api/list?uid=' + encodeURIComponent(profile));
        const checkData = await checkRes.json();
        const count = (checkData.files || []).filter(f => f.name && f.name !== '.emptyFolderPlaceholder').length;
        if (count >= 5) {
          setStatus('error', 'Bibliothèque pleine (5/5) — supprime un enregistrement');
          return;
        }
      } catch(e) { console.warn('Quota check failed:', e.message); }
    }

    const title = document.getElementById('title').value || 'enregistrement';
    const fd = new FormData();
    fd.append('audio', segBlob, 'rec.webm');
    fd.append('title', title);
    fd.append('email', localStorage.getItem('ponk_email') || profile);
    fd.append('profile', profile);
    fd.append('sessionId', sessionId);
    fd.append('segmentIndex', String(segmentIndex));
    fd.append('isFinal', isFinal ? 'true' : 'false');

    try {
      const res = await fetch('/api/upload', {method:'POST', body:fd});
      if (res.ok) {
        const r = await res.json();
        segmentFileNames.push(r.fileName);
        if (isFinal) {
          // Dernier segment uploadé — on retient le fileName principal (premier segment ou dernier selon API)
          uploadedFileName = segmentFileNames[0]; // analyze utilisera sessionId
          localStorage.setItem('ponk_drive_file', JSON.stringify({ ...r, sessionId, segmentFileNames }));
          setStatus('active', 'Audio sauvegardé ☁️ — ' + fmt(seconds));
          document.getElementById('btnAnalyze').classList.add('visible');
          // Arrêter le stream micro maintenant que tout est uploadé
          if (recorder && recorder.stream) recorder.stream.getTracks().forEach(t=>t.stop());
        } else {
          console.log(`[segment ${segmentIndex}] uploaded: ${r.fileName}`);
        }
      }
    } catch(e) { console.warn('Upload segment:', e.message); }
  }

  function tick() {
    const m = String(Math.floor(seconds/60)).padStart(2,'0');
    const s = String(seconds%60).padStart(2,'0');
    document.getElementById('timer').textContent = m+':'+s;
  }

  const STEPS = ['Transcription en cours…','Analyse du contexte…','Identification des thèmes…','Génération du résumé…','Extraction des actions…','Finalisation…'];
  const STEPS_PCT = [10, 25, 45, 65, 82, 95];
  let stepInterval = null;
  let overlayRaf = null;

  function showOverlay(recordingSeconds) {
    const overlay = document.getElementById('overlay');
    overlay.classList.add('active');

    // Estimation durée totale : 5s fixe + 8s par minute d'audio — x2 pour laisser le temps à l'analyse
    const estimatedMs = (5 + (recordingSeconds / 60) * 8) * 1000 * 2;
    // Chaque étape occupe une fraction du temps total
    const stepDurations = [0.18, 0.15, 0.17, 0.18, 0.17, 0.15]; // somme = 1
    const stepTimings = [];
    let acc = 0;
    stepDurations.forEach(d => { stepTimings.push(acc); acc += d; });

    const startTime = Date.now();
    let currentStep = 0;
    let progress = 0;

    // Init steps UI
    const stepEls = document.querySelectorAll('.overlay-step');
    stepEls.forEach(s => {
      s.querySelector('.overlay-step-dot').classList.remove('active');
      s.querySelector('.overlay-step-dot').style.background = 'rgba(0,220,255,0.15)';
      s.querySelector('.overlay-step-label').classList.remove('active','done');
    });
    document.getElementById('overlayText').textContent = STEPS[0];
    document.getElementById('overlayPct').textContent = '0%';
    if (stepEls[0]) {
      stepEls[0].querySelector('.overlay-step-dot').classList.add('active');
      stepEls[0].querySelector('.overlay-step-label').classList.add('active');
    }

    // Canvas orbe
    const canvas = document.getElementById('overlayCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const cx = W/2, cy = H/2;
    const RING_R = 72, ORB_ORBIT = 94;
    let orbAngle = -Math.PI/2, bgAngle = 0;
    let smoothProgress = 0;

    function drawOrbe() {
      ctx.clearRect(0, 0, W, H);

      // Calcul % basé sur temps écoulé — plafonné à 97%
      const elapsed = Date.now() - startTime;
      const rawPct = Math.min(elapsed / estimatedMs, 0.97);
      smoothProgress += (rawPct - smoothProgress) * 0.04;
      progress = smoothProgress;

      // Mise à jour étape courante selon progression
      const newStep = stepTimings.filter(t => rawPct >= t).length - 1;
      if (newStep !== currentStep && newStep >= 0 && newStep < STEPS.length) {
        currentStep = newStep;
        document.getElementById('overlayText').textContent = STEPS[currentStep];
        stepEls.forEach((s, i) => {
          const dot = s.querySelector('.overlay-step-dot');
          const lbl = s.querySelector('.overlay-step-label');
          dot.classList.remove('active'); lbl.classList.remove('active','done');
          if (i < currentStep) { lbl.classList.add('done'); dot.style.background = 'rgba(0,220,255,0.4)'; dot.style.boxShadow = 'none'; }
          else if (i === currentStep) { dot.classList.add('active'); lbl.classList.add('active'); }
          else { dot.style.background = 'rgba(0,220,255,0.15)'; dot.style.boxShadow = 'none'; }
        });
      }

      bgAngle += 0.008;
      orbAngle += 0.025;

      // Anneaux décoratifs
      [88, 80].forEach((r, ri) => {
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(0,220,255,${0.05 + 0.01*Math.sin(bgAngle+ri)})`;
        ctx.lineWidth = 0.5; ctx.stroke();
      });

      // Arc fond
      ctx.beginPath(); ctx.arc(cx, cy, RING_R, -Math.PI/2, -Math.PI/2 + Math.PI*2);
      ctx.strokeStyle = 'rgba(0,220,255,0.08)'; ctx.lineWidth = 4;
      ctx.lineCap = 'round'; ctx.stroke();

      // Arc progression
      ctx.beginPath(); ctx.arc(cx, cy, RING_R, -Math.PI/2, -Math.PI/2 + Math.PI*2*progress);
      ctx.strokeStyle = 'rgba(0,220,255,0.85)'; ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.shadowColor = '#00dcff'; ctx.shadowBlur = 10; ctx.stroke(); ctx.shadowBlur = 0;

      // Orbe satellite
      const ox = cx + ORB_ORBIT * Math.cos(orbAngle);
      const oy = cy + ORB_ORBIT * Math.sin(orbAngle);

      for (let t = 1; t <= 10; t++) {
        const ta = orbAngle - t * 0.055;
        const tx = cx + ORB_ORBIT * Math.cos(ta);
        const ty = cy + ORB_ORBIT * Math.sin(ta);
        ctx.beginPath(); ctx.arc(tx, ty, 2.5*(1-t/11), 0, Math.PI*2);
        ctx.fillStyle = `rgba(0,220,255,${0.35*(1-t/11)})`; ctx.fill();
      }

      const g2 = ctx.createRadialGradient(ox, oy, 0, ox, oy, 16);
      g2.addColorStop(0, 'rgba(200,240,255,0.18)'); g2.addColorStop(1, 'transparent');
      ctx.beginPath(); ctx.arc(ox, oy, 16, 0, Math.PI*2); ctx.fillStyle = g2; ctx.fill();

      const g = ctx.createRadialGradient(ox, oy, 0, ox, oy, 8);
      g.addColorStop(0, 'rgba(255,255,255,1)');
      g.addColorStop(0.35, 'rgba(180,240,255,0.95)');
      g.addColorStop(1, 'rgba(0,220,255,0)');
      ctx.beginPath(); ctx.arc(ox, oy, 8, 0, Math.PI*2);
      ctx.fillStyle = g;
      ctx.shadowColor = '#ffffff'; ctx.shadowBlur = 16; ctx.fill();
      ctx.shadowColor = '#00dcff'; ctx.shadowBlur = 20; ctx.fill();
      ctx.shadowBlur = 0;

      document.getElementById('overlayPct').textContent = Math.round(progress * 100) + '%';
      overlayRaf = requestAnimationFrame(drawOrbe);
    }
    drawOrbe();
  }

  function hideOverlay() {
    // Finir à 100% brièvement avant de fermer
    const pctEl = document.getElementById('overlayPct');

  async function analyze() {
    if(!uploadedFileName && segmentFileNames.length === 0) return;
    document.getElementById('btnAnalyze').disabled = true;
    showOverlay(seconds);
    const title    = document.getElementById('title').value || '';
    const duration = fmt(seconds);
    const now      = new Date();
    const datetime = now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}) + ' à ' + now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    const profile  = localStorage.getItem('ponk_profile') || 'user';
    const savedBubbles = [];

    try {
      // Étape 1 : utiliser les fileNames déjà uploadés automatiquement
      if (segmentFileNames.length === 0) throw new Error('Audio non encore uploadé, réessaie dans un instant');
      const fileName = segmentFileNames[0]; // pour compatibilité library/results

      // Étape 2 : envoyer sessionId + segmentFileNames + métadonnées à analyze
      const analyzeRes = await fetch('/api/analyze', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          fileName,
          segmentFileNames,
          title,
          duration,
          datetime,
          profile,
          bubbles: savedBubbles
        })
      });
      if (!analyzeRes.ok) throw new Error('Erreur analyse ' + analyzeRes.status);
      const data = await analyzeRes.json();
      localStorage.setItem('ponk_result', JSON.stringify(data));
      localStorage.setItem('ponk_meta', JSON.stringify({title, duration, datetime}));
      localStorage.setItem(`ponk_analyzed_${fileName.split('/').pop()}`, JSON.stringify(data));
      
      window.location.href = '/results.html';
    } catch(e) {
      hideOverlay();
      setStatus('error', e.message);
      document.getElementById('btnAnalyze').disabled = false;
    }
  }

  const COLORS = ['#4a7fd4','#e05555','#3db87a','#e07a30','#8a55d4','#d45580','#30a8d4','#50c87a'];
  function getColor(name) {
    let hash=0; for(let i=0;i<name.length;i++) hash=name.charCodeAt(i)+((hash<<5)-hash);
    return COLORS[Math.abs(hash)%COLORS.length];

  async function launchPortal() {
    const btn = document.getElementById('submitBtn');
    const screen = document.getElementById('profileScreen');
    const orb = document.getElementById('portalOrb');
    const btnRect = btn.getBoundingClientRect();
    const scrRect = screen.getBoundingClientRect();
    const cx = btnRect.left - scrRect.left + btnRect.width / 2;
    const cy = btnRect.top  - scrRect.top  + btnRect.height / 2;
    orb.style.left = cx + 'px';
    orb.style.top  = cy + 'px';
    btn.style.opacity = '0';
    btn.style.pointerEvents = 'none';

    const step = () => {
      scale += scale < 5 ? 0.3 : scale < 20 ? 1.2 : 3;
      orb.style.transform = `translate(-50%,-50%) scale(${scale})`;
      if (scale < maxScale) requestAnimationFrame(step);
      else submitProfile();
    };
    requestAnimationFrame(step);
  }

  async function initProfile() {
    const profile = localStorage.getItem('ponk_profile');
    const email   = localStorage.getItem('ponk_email');
    if (profile && email) {
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 3000);
        const res = await fetch('/api/profile?email=' + encodeURIComponent(email), { signal: controller.signal });
        clearTimeout(timeout);
        if (res.ok) {
          const data = await res.json();
          if (data.prefs) {
            if (data.prefs.mail)  localStorage.setItem('ponk_pref_mail', data.prefs.mail);
            if (data.prefs.cal)   localStorage.setItem('ponk_pref_cal', data.prefs.cal);
            if (data.prefs.maps)  localStorage.setItem('ponk_pref_maps', data.prefs.maps);
            if (data.prefs.ville) localStorage.setItem('ponk_ville', data.prefs.ville);
          }
          if (data.name) localStorage.setItem('ponk_profile', data.name);
        }
      } catch(e) {}
      showApp(localStorage.getItem('ponk_profile'));
    } else {
      document.getElementById('profileScreen').classList.add('visible');
    }
  }

    const name  = document.getElementById('profileName').value.trim();

    if (!name)  { document.getElementById('profileName').focus(); return; }
    if (!email) { document.getElementById('profileEmail').focus(); return; }
    const mail  = document.querySelector('#prefMail .pref-btn.active')?.dataset.value || 'gmail';

    const ville = document.getElementById('profileVille').value.trim();
    localStorage.setItem('ponk_profile', name);
    localStorage.setItem('ponk_email', email);
    localStorage.setItem('ponk_pref_mail', mail);
    localStorage.setItem('ponk_pref_cal', cal);
    localStorage.setItem('ponk_pref_maps', maps);
    if (ville) localStorage.setItem('ponk_ville', ville);
    try {
      await fetch('/api/profile', {

        headers: {'Content-Type': 'application/json'},

    function cube(ctx, cx, cy, r, rot, color) {

      const pts=verts.map(([x,y,z])=>{const x2=x*cry+z*sry,z2=-x*sry+z*cry,y2=y*crx-z2*srx,sc=r/(2.2+z2*0.3);return{px:cx+x2*sc,py:cy+y2*sc};});

    for(let i=0;i<12;i++)lines.push({x1:Math.random(),y1:Math.random(),x2:Math.random(),y2:Math.random(),vx:(Math.random()-0.5)*0.0002,vy:(Math.random()-0.5)*0.0002,phase:Math.random()*Math.PI*2,speed:0.003+Math.random()*0.004,opacity:0.06+Math.random()*0.10});
    const auras=[{x:0.30,y:0.40,r:0.18,speed:0.005,phase:0},{x:0.30,y:0.40,r:0.26,speed:0.003,phase:1.5},{x:0.30,y:0.40,r:0.34,speed:0.002,phase:3}];
    function animate3(){const w=canvas.width,h=canvas.height;ctx.clearRect(0,0,w,h);auras.forEach(a=>{a.phase+=a.speed;const r=a.r*Math.min(w,h)*(1+Math.sin(a.phase)*0.02),alpha=0.04+Math.sin(a.phase)*0.015;ctx.beginPath();ctx.arc(a.x*w,a.y*h,r,0,Math.PI*2);ctx.strokeStyle=`rgba(0,220,255,${alpha})`;ctx.lineWidth=1;ctx.shadowColor='#00dcff';ctx.shadowBlur=4;ctx.stroke();ctx.shadowBlur=0;});lines.forEach(l=>{l.phase+=l.speed;l.x1+=l.vx;l.y1+=l.vy;l.x2-=l.vx;l.y2-=l.vy;if(l.x1<0||l.x1>1)l.vx*=-1;if(l.y1<0||l.y1>1)l.vy*=-1;if(l.x2<0||l.x2>1)l.vx*=-1;if(l.y2<0||l.y2>1)l.vy*=-1;const alpha=l.opacity*(0.5+0.5*Math.sin(l.phase));ctx.beginPath();ctx.moveTo(l.x1*w,l.y1*h);ctx.lineTo(l.x2*w,l.y2*h);ctx.strokeStyle=`rgba(0,180,255,${alpha})`;ctx.lineWidth=0.5;ctx.stroke();});particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.pulse+=p.pulseSpeed;if(p.x<0||p.x>1)p.vx*=-1;if(p.y<0||p.y>1)p.vy*=-1;const alpha=p.opacity*(0.5+0.5*Math.sin(p.pulse)),size=p.size*(0.8+0.2*Math.sin(p.pulse)),g=ctx.createRadialGradient(p.x*w,p.y*h,0,p.x*w,p.y*h,size*4);g.addColorStop(0,`rgba(255,255,255,${alpha*0.3})`);g.addColorStop(1,'transparent');ctx.beginPath();ctx.arc(p.x*w,p.y*h,size*4,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();ctx.beginPath();ctx.arc(p.x*w,p.y*h,size,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${alpha})`;ctx.shadowColor='#fff';ctx.shadowBlur=8;ctx.fill();ctx.shadowBlur=0;});requestAnimationFrame(animate3);}
    animate3();
  }

  const _origInitProfile = initProfile;
  initProfile = async function() {
    await _origInitProfile();
    if (document.getElementById('profileScreen')?.classList.contains('visible')) initGeoCanvas();
  };
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      if (document.getElementById('profileScreen')?.classList.contains('visible')) initGeoCanvas();
    }, 150);
  });

  initProfile();

  // Fallback : si après 2s rien n'est visible, forcer l'affichage
  setTimeout(() => {
    const profile = localStorage.getItem('ponk_profile');
    const email = localStorage.getItem('ponk_email');
    const mainApp = document.getElementById('mainApp');
    const profileScreen = document.getElementById('profileScreen');
    const bothHidden = mainApp.classList.contains('hidden') && !profileScreen.classList.contains('visible');
    if (bothHidden) {
      if (profile && email) {
        showApp(profile);
      } else {
        profileScreen.classList.add('visible');
      }
    }
  }, 2000);

</script>
