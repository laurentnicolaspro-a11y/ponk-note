<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ponk Note — Paramètres</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
    :root {
      --bg-deep:   #050c1a;
      --bg-mid:    #080f20;
      --bg-card:   rgba(4,10,30,0.7);
      --bg-card2:  rgba(4,10,30,0.85);
      --cyan:      #00d4ff;
      --cyan-dim:  rgba(0,212,255,0.55);
      --cyan-glow: rgba(0,212,255,0.18);
      --cyan-border: rgba(0,212,255,0.3);
      --cyan-border-hi: rgba(0,212,255,0.6);
      --text:      #e8f4ff;
      --muted:     rgba(180,220,255,0.45);
      --danger:    #ff4466;
      --green:     #00e5a0;
      --font-display: 'Orbitron', sans-serif;
      --font-body:    'Exo 2', sans-serif;
    }

    html, body { min-height:100%; font-family:var(--font-body); color:var(--text); background:var(--bg-deep); }
    body { padding-bottom:60px; overflow-x:hidden; }

    body::before {
      content:'';
      position:fixed; inset:0; z-index:0;
      background: radial-gradient(ellipse at 20% 30%, #1a3060 0%, #101e40 40%, #080f28 100%);
    }

    #neuroCanvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

    .scanline {
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background:linear-gradient(transparent 50%, rgba(0,212,255,0.03) 50%);
      background-size:100% 4px;
      animation:scanline 8s linear infinite;
    }
    @keyframes scanline {
      0%   { transform:translateY(-100%); opacity:0.03; }
      100% { transform:translateY(100vh); opacity:0.03; }
    }

    /* Header */
    header {
      position:sticky; top:0; z-index:10;
      background:rgba(5,12,26,0.85);
      backdrop-filter:blur(20px);
      border-bottom:1px solid var(--cyan-border);
      padding:env(safe-area-inset-top,0px) 20px 0;
    }
    .header-inner { display:flex; align-items:center; justify-content:space-between; padding:14px 0; max-width:430px; margin:0 auto; }
    .logo {
      font-family:var(--font-display);
      font-size:16px; font-weight:700; letter-spacing:1px;
      color:var(--cyan);
      text-shadow: 0 0 10px var(--cyan-dim), 0 0 20px rgba(0,212,255,0.3);
    }
    .logo span { color:var(--text); text-shadow: 0 0 10px rgba(232,244,255,0.6), 0 0 20px rgba(232,244,255,0.3); }

    .back-btn {
      background:transparent;
      border:1px solid var(--cyan-border);
      color:var(--cyan);
      padding:6px 14px;
      border-radius:6px;
      font-family:var(--font-display);
      font-size:11px; font-weight:600; letter-spacing:0.5px;
      cursor:pointer;
      transition:background 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color:transparent;
    }
    .back-btn:hover, .back-btn:active { background:var(--cyan-glow); border-color:var(--cyan-border-hi); }

    /* Content */
    .content { position:relative; z-index:1; max-width:430px; margin:0 auto; padding:20px 20px 0; }

    /* Section title */
    .section-title {
      font-family:var(--font-display);
      font-size:9px; font-weight:700;
      color:var(--cyan-dim);
      text-transform:uppercase; letter-spacing:2px;
      margin:20px 0 10px; padding:0 4px;
    }

    /* Pref card */
    .pref-card {
      background:var(--bg-card);
      border:1px solid var(--cyan-border);
      border-radius:12px;
      overflow:hidden;
      margin-bottom:10px;
      transition:border-color 0.2s;
    }
    .pref-card:hover { border-color:var(--cyan-border-hi); }

    .pref-row {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 16px;
      border-bottom:1px solid rgba(0,212,255,0.08);
    }
    .pref-row:last-child { border-bottom:none; }

    .pref-label-wrap { display:flex; align-items:center; gap:10px; }
    .pref-icon { font-size:16px; }
    .pref-name {
      font-family:var(--font-display);
      font-size:11px; font-weight:600; letter-spacing:0.5px;
      color:var(--text);
    }

    .pref-select {
      background:rgba(0,212,255,0.05);
      border:1px solid var(--cyan-border);
      border-radius:6px;
      padding:6px 10px;
      font-family:var(--font-display);
      font-size:10px; letter-spacing:0.5px;
      color:var(--cyan);
      outline:none; cursor:pointer;
      transition:border-color 0.2s, background 0.2s;
    }
    .pref-select:focus { border-color:var(--cyan-border-hi); background:var(--cyan-glow); }
    .pref-select option { background:var(--bg-deep); color:var(--text); }

    .pref-input {
      background:rgba(0,212,255,0.05);
      border:1px solid var(--cyan-border);
      border-radius:6px;
      padding:6px 10px;
      font-family:var(--font-body);
      font-size:13px;
      color:var(--text);
      outline:none; width:140px;
      transition:border-color 0.2s, background 0.2s;
    }
    .pref-input::placeholder { color:var(--muted); }
    .pref-input:focus { border-color:var(--cyan-border-hi); background:var(--cyan-glow); }

    /* Contact card */
    .contact-card {
      background:var(--bg-card);
      border:1px solid var(--cyan-border);
      border-radius:12px;
      overflow:hidden;
      margin-bottom:8px;
      animation:cardIn 0.25s ease both;
      transition:border-color 0.2s, background 0.2s;
    }
    .contact-card:hover { border-color:var(--cyan-border-hi); background:var(--bg-card2); }
    @keyframes cardIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    .contact-row { display:flex; align-items:center; gap:12px; padding:12px 16px; }
    .contact-avatar {
      width:36px; height:36px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-display); font-size:13px; font-weight:700;
      color:#fff; flex-shrink:0;
      border:1.5px solid var(--cyan-border);
      box-shadow:0 0 8px var(--cyan-glow);
    }
    .contact-info { flex:1; }
    .contact-name { font-family:var(--font-display); font-size:12px; font-weight:600; letter-spacing:0.3px; color:var(--text); }
    .contact-detail { font-family:var(--font-body); font-size:12px; color:var(--muted); margin-top:2px; }
    .contact-edit {
      width:32px; height:32px; border-radius:6px;
      background:rgba(0,212,255,0.06);
      border:1px solid var(--cyan-border);
      cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color:transparent;
    }
    .contact-edit:hover { background:var(--cyan-glow); border-color:var(--cyan-border-hi); }
    .contact-delete {
      width:32px; height:32px; border-radius:6px;
      background:rgba(255,68,102,0.08);
      border:1px solid rgba(255,68,102,0.25);
      cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      color:var(--danger); font-size:16px;
      transition:background 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color:transparent;
    }
    .contact-delete:hover { background:rgba(255,68,102,0.18); border-color:rgba(255,68,102,0.5); }

    /* Add contact form */
    .add-contact-form {
      background:var(--bg-card);
      border:1px solid var(--cyan-border);
      border-radius:12px;
      padding:16px;
      margin-bottom:10px;
      display:none;
    }
    .add-contact-form.visible { display:block; }

    .form-input {
      width:100%; padding:11px 14px;
      border-radius:8px;
      border:1px solid var(--cyan-border);
      background:rgba(0,212,255,0.04);
      font-family:var(--font-body); font-size:14px;
      color:var(--text); outline:none;
      margin-bottom:8px;
      transition:border-color 0.2s, background 0.2s;
    }
    .form-input::placeholder { color:var(--muted); }
    .form-input:focus { border-color:var(--cyan-border-hi); background:var(--cyan-glow); }

    .form-btns { display:flex; gap:8px; margin-top:4px; }
    .btn-save {
      flex:1; padding:11px; border-radius:8px; border:none;
      background:var(--cyan);
      color:var(--bg-deep);
      font-family:var(--font-display); font-size:11px; font-weight:700; letter-spacing:1px;
      cursor:pointer;
      box-shadow:0 0 12px var(--cyan-dim);
      transition:box-shadow 0.2s, opacity 0.2s;
    }
    .btn-save:hover { box-shadow:0 0 20px var(--cyan-dim); }
    .btn-save:active { opacity:0.8; }

    .btn-cancel-form {
      padding:11px 16px; border-radius:8px;
      border:1px solid var(--cyan-border);
      background:transparent;
      color:var(--muted);
      font-family:var(--font-display); font-size:11px; letter-spacing:0.5px;
      cursor:pointer;
      transition:background 0.2s;
    }
    .btn-cancel-form:hover { background:var(--cyan-glow); }

    .btn-add-contact {
      width:100%; padding:13px; border-radius:10px;
      border:1px dashed var(--cyan-border);
      background:rgba(0,212,255,0.03);
      color:var(--cyan);
      font-family:var(--font-display); font-size:11px; font-weight:600; letter-spacing:1px;
      cursor:pointer;
      transition:background 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color:transparent;
    }
    .btn-add-contact:hover { background:var(--cyan-glow); border-color:var(--cyan-border-hi); }

    /* Danger */
    .btn-danger {
      width:100%; padding:13px; border-radius:10px;
      border:1px solid rgba(255,68,102,0.3);
      background:rgba(255,68,102,0.05);
      color:var(--danger);
      font-family:var(--font-display); font-size:11px; font-weight:600; letter-spacing:1px;
      cursor:pointer; margin-top:8px;
      transition:background 0.2s, border-color 0.2s;
    }
    .btn-danger:hover { background:rgba(255,68,102,0.12); border-color:rgba(255,68,102,0.5); }
  </style>
</head>
<body>
<canvas id="neuroCanvas"></canvas>
<div class="scanline"></div>

<header>
  <div class="header-inner">
    <span class="logo">Ponk <span>Note</span></span>
    <button class="back-btn" onclick="window.location.href='/library.html'">← Retour</button>
  </div>
</header>

<div class="content">

  <div class="section-title">Préférences</div>
  <div class="pref-card">
    <div class="pref-row">
      <div class="pref-label-wrap"><span class="pref-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg></span><span class="pref-name">Client mail</span></div>
      <select class="pref-select" id="prefMail" onchange="savePref('ponk_pref_mail', this.value)">
        <option value="gmail">Gmail</option>
        <option value="outlook">Outlook</option>
        <option value="yahoo">Yahoo</option>
        <option value="default">Autre</option>
      </select>
    </div>
    <div class="pref-row">
      <div class="pref-label-wrap"><span class="pref-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span><span class="pref-name">Calendrier</span></div>
      <select class="pref-select" id="prefCal" onchange="savePref('ponk_pref_cal', this.value)">
        <option value="google">Google</option>
        <option value="outlook">Outlook</option>
        <option value="apple">Apple</option>
      </select>
    </div>
    <div class="pref-row">
      <div class="pref-label-wrap"><span class="pref-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg></span><span class="pref-name">Navigation</span></div>
      <select class="pref-select" id="prefMaps" onchange="savePref('ponk_pref_maps', this.value)">
        <option value="google">Google Maps</option>
        <option value="waze">Waze</option>
        <option value="apple">Apple Maps</option>
      </select>
    </div>
    <div class="pref-row">
      <div class="pref-label-wrap"><span class="pref-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></span><span class="pref-name">Ma ville</span></div>
      <input type="text" class="pref-input" id="prefVille" placeholder="Ex: Cambrai"
        onchange="savePref('ponk_ville', this.value)"
        onblur="savePref('ponk_ville', this.value)" />
    </div>
  </div>

  <div class="section-title">Carnet de contacts</div>
  <div class="add-contact-form" id="addContactForm">
    <input class="form-input" id="contactName" placeholder="Prénom et nom" autocomplete="off" />
    <input class="form-input" id="contactEmail" placeholder="Email" type="email" autocomplete="off" />
    <input class="form-input" id="contactPhone" placeholder="Téléphone (+33...)" type="tel" autocomplete="off" />
    <div class="form-btns">
      <button class="btn-cancel-form" onclick="toggleAddForm()">Annuler</button>
      <button class="btn-save" onclick="saveContact()">Enregistrer</button>
    </div>
  </div>
  <div id="contactsList"></div>
  <button class="btn-add-contact" id="btnAddContact" onclick="toggleAddForm()">+ Ajouter un contact</button>

  <div class="section-title">Compte</div>
  <button class="btn-danger" onclick="changeProfile()">Changer de profil</button>

</div>

<script>
  const COLORS = ['#4a7fd4','#e05555','#3db87a','#e07a30','#8a55d4','#d45580','#30a8d4'];
  function getColor(name) {
    let h=0; for(let i=0;i<name.length;i++) h=name.charCodeAt(i)+((h<<5)-h);
    return COLORS[Math.abs(h)%COLORS.length];
  }

  function loadPrefs() {
    ['prefMail','prefCal','prefMaps'].forEach(id => {
      const key = 'ponk_pref_' + id.replace('pref','').toLowerCase();
      const val = localStorage.getItem(key);
      if (val) document.getElementById(id).value = val;
    });
    document.getElementById('prefVille').value = localStorage.getItem('ponk_ville') || '';
  }

  function savePref(key, value) {
    localStorage.setItem(key, value);
    syncToSupabase();
  }

  function getContacts() {
    try { return JSON.parse(localStorage.getItem('ponk_contacts') || '[]'); } catch(e) { return []; }
  }
  function saveContacts(contacts) { localStorage.setItem('ponk_contacts', JSON.stringify(contacts)); }

  function renderContacts() {
    const contacts = getContacts();
    document.getElementById('contactsList').innerHTML = contacts.map((c, i) => `
      <div class="contact-card" style="animation-delay:${i*50}ms">
        <div class="contact-row">
          <div class="contact-avatar" style="background:${getColor(c.name)}">${c.name[0].toUpperCase()}</div>
          <div class="contact-info">
            <div class="contact-name">${c.name}</div>
            <div class="contact-detail">${[c.email, c.phone].filter(Boolean).join(' · ')}</div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="contact-edit" onclick="editContact(${i})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
            <button class="contact-delete" onclick="deleteContact(${i})">×</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function toggleAddForm() {
    const form = document.getElementById('addContactForm');
    const btn = document.getElementById('btnAddContact');
    const visible = form.classList.toggle('visible');
    btn.textContent = visible ? '− Annuler' : '+ Ajouter un contact';
    if (visible) document.getElementById('contactName').focus();
    else {
      document.getElementById('contactName').value = '';
      document.getElementById('contactEmail').value = '';
      document.getElementById('contactPhone').value = '';
    }
  }

  async function syncToSupabase() {
    const email = localStorage.getItem('ponk_email');
    const name  = localStorage.getItem('ponk_profile');
    if (!email) return;
    const prefs = {
      mail:  localStorage.getItem('ponk_pref_mail')  || 'gmail',
      cal:   localStorage.getItem('ponk_pref_cal')   || 'google',
      maps:  localStorage.getItem('ponk_pref_maps')  || 'google',
      ville: localStorage.getItem('ponk_ville')      || '',
    };
    try {
      await fetch('/api/profile', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email, name, prefs, contacts: getContacts() })
      });
    } catch(e) { console.warn('Sync failed:', e); }
  }

  function saveContact() {
    const name  = document.getElementById('contactName').value.trim();
    const email = document.getElementById('contactEmail').value.trim();
    const phone = document.getElementById('contactPhone').value.trim();
    if (!name) { document.getElementById('contactName').focus(); return; }
    const contacts = getContacts();
    const form = document.getElementById('addContactForm');
    const editIndex = form.dataset.editIndex;
    if (editIndex !== undefined && editIndex !== '') {
      contacts[parseInt(editIndex)] = { name, email, phone };
      delete form.dataset.editIndex;
    } else {
      contacts.push({ name, email, phone });
    }
    saveContacts(contacts);
    renderContacts();
    toggleAddForm();
    syncToSupabase();
  }

  function editContact(index) {
    const contacts = getContacts();
    const c = contacts[index];
    document.getElementById('contactName').value = c.name || '';
    document.getElementById('contactEmail').value = c.email || '';
    document.getElementById('contactPhone').value = c.phone || '';
    // Supprimer l'ancien et afficher le formulaire en mode édition
    const form = document.getElementById('addContactForm');
    const btn = document.getElementById('btnAddContact');
    form.classList.add('visible');
    btn.textContent = '− Annuler';
    document.getElementById('contactName').focus();
    // Stocker l'index en édition
    form.dataset.editIndex = index;
  }

  function deleteContact(index) {
    if (!confirm('Supprimer ce contact ?')) return;
    const contacts = getContacts();
    contacts.splice(index, 1);
    saveContacts(contacts);
    renderContacts();
    syncToSupabase();
  }

  function changeProfile() {
    if (confirm('Changer de profil ?')) {
      localStorage.removeItem('ponk_profile');
      localStorage.removeItem('ponk_email');
      window.location.href = '/';
    }
  }

  loadPrefs();
  renderContacts();

  // ── Canvas neural (identique à library.html) ──
  (function initNeuro() {
    const canvas = document.getElementById('neuroCanvas');
    const ctx = canvas.getContext('2d');
    const SIDE = 0.22;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    const particles = [];
    for (let i = 0; i < 40; i++) {
      const left = Math.random() < 0.5;
      particles.push({
        x: left ? Math.random() * SIDE : (1 - SIDE) + Math.random() * SIDE,
        y: Math.random(),
        vx: (Math.random() - 0.5) * 0.0005,
        vy: (Math.random() - 0.5) * 0.0005,
        size: 0.8 + Math.random() * 2,
        opacity: 0.3 + Math.random() * 0.6,
        pulse: Math.random() * Math.PI * 2,
        pulseSpeed: 0.015 + Math.random() * 0.025
      });
    }

    const lines = [];
    for (let i = 0; i < 14; i++) {
      const left = Math.random() < 0.5;
      const bx = left ? 0 : (1 - SIDE);
      lines.push({
        x1: bx + Math.random() * SIDE, y1: Math.random(),
        x2: bx + Math.random() * SIDE, y2: Math.random(),
        vx: (Math.random() - 0.5) * 0.00015,
        vy: (Math.random() - 0.5) * 0.00015,
        phase: Math.random() * Math.PI * 2,
        speed: 0.002 + Math.random() * 0.003,
        opacity: 0.05 + Math.random() * 0.08,
        left
      });
    }

    function clampSide(p) {
      const bx = p.x < 0.5 ? 0 : (1 - SIDE);
      if (p.x < bx) { p.x = bx; p.vx *= -1; }
      if (p.x > bx + SIDE) { p.x = bx + SIDE; p.vx *= -1; }
      if (p.y < 0) { p.y = 0; p.vy *= -1; }
      if (p.y > 1) { p.y = 1; p.vy *= -1; }
    }

    function animate() {
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      lines.forEach(l => {
        l.phase += l.speed;
        l.x1 += l.vx; l.y1 += l.vy;
        l.x2 -= l.vx; l.y2 -= l.vy;
        const bx = l.left ? 0 : (1 - SIDE);
        if (l.x1 < bx || l.x1 > bx + SIDE) l.vx *= -1;
        if (l.x2 < bx || l.x2 > bx + SIDE) l.vx *= -1;
        if (l.y1 < 0 || l.y1 > 1) l.vy *= -1;
        if (l.y2 < 0 || l.y2 > 1) l.vy *= -1;
        const alpha = 0.25 + 0.2 * Math.sin(l.phase);
        ctx.beginPath();
        ctx.moveTo(l.x1 * w, l.y1 * h);
        ctx.lineTo(l.x2 * w, l.y2 * h);
        ctx.strokeStyle = `rgba(0,200,255,${alpha})`;
        ctx.lineWidth = 0.7;
        ctx.stroke();
      });

      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i], b = particles[j];
          const sameSide = (a.x < 0.5) === (b.x < 0.5);
          if (!sameSide) continue;
          const dx = (a.x - b.x) * w, dy = (a.y - b.y) * h;
          const dist = Math.sqrt(dx*dx + dy*dy);
          const maxDist = w * SIDE * 0.9;
          if (dist < maxDist) {
            const alpha = 0.3 * (1 - dist / maxDist);
            ctx.beginPath();
            ctx.moveTo(a.x * w, a.y * h);
            ctx.lineTo(b.x * w, b.y * h);
            ctx.strokeStyle = `rgba(0,180,255,${alpha})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }

      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        p.pulse += p.pulseSpeed;
        clampSide(p);
        const alpha = p.opacity * (0.5 + 0.5 * Math.sin(p.pulse));
        const size = p.size * (0.8 + 0.2 * Math.sin(p.pulse));
        const g = ctx.createRadialGradient(p.x*w, p.y*h, 0, p.x*w, p.y*h, size*4);
        g.addColorStop(0, `rgba(255,255,255,${alpha * 0.25})`);
        g.addColorStop(1, 'transparent');
        ctx.beginPath(); ctx.arc(p.x*w, p.y*h, size*4, 0, Math.PI*2);
        ctx.fillStyle = g; ctx.fill();
        ctx.beginPath(); ctx.arc(p.x*w, p.y*h, size, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.shadowColor = '#00dcff';
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.shadowBlur = 0;
      });

      requestAnimationFrame(animate);
    }
    animate();
  })();
</script>
</body>
</html>
