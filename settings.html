<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ponk Note — Paramètres</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
    :root {
      --glass:rgba(255,255,255,0.45); --glass-border:rgba(255,255,255,0.7);
      --text:#2a2a3a; --muted:rgba(42,42,58,0.5);
      --accent:#4a7fd4; --danger:#e05555; --green:#3db87a;
      --surface:rgba(255,255,255,0.55);
    }
    html,body { height:100%; font-family:'Inter',-apple-system,sans-serif; color:var(--text); overflow:hidden; }
    #bg { position:fixed; inset:0; z-index:-1; background:linear-gradient(145deg,#e8d8f8 0%,#d8e8f8 40%,#f0e8f8 100%); }

    .app { display:flex; flex-direction:column; height:100dvh; max-width:430px; margin:0 auto; padding:env(safe-area-inset-top,0px) 0 env(safe-area-inset-bottom,16px); }

    header { display:flex; align-items:center; justify-content:space-between; padding:16px 22px 12px; flex-shrink:0; }
    .logo-text { font-size:17px; font-weight:700; letter-spacing:-0.3px; }
    .logo-text span { color:var(--muted); font-weight:400; }
    .btn-back {
      display:flex; align-items:center; gap:6px;
      background:var(--glass); border:1.5px solid var(--glass-border);
      backdrop-filter:blur(20px); border-radius:100px; padding:6px 14px;
      font-size:13px; font-weight:500; color:var(--muted); cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .btn-back:active { opacity:0.7; }

    .content { flex:1; overflow-y:auto; padding:0 20px 20px; }

    .section-title {
      font-size:11px; font-weight:600; text-transform:uppercase;
      letter-spacing:0.8px; color:var(--muted); margin:20px 0 10px;
    }

    /* Pref rows */
    .pref-card { background:var(--glass); border:1.5px solid var(--glass-border); backdrop-filter:blur(20px); border-radius:16px; overflow:hidden; margin-bottom:10px; }
    .pref-row { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid rgba(255,255,255,0.4); }
    .pref-row:last-child { border-bottom:none; }
    .pref-label-wrap { display:flex; align-items:center; gap:10px; }
    .pref-icon { font-size:18px; }
    .pref-name { font-size:14px; font-weight:500; }
    .pref-select {
      background:rgba(255,255,255,0.6); border:1px solid rgba(255,255,255,0.8);
      border-radius:8px; padding:6px 10px; font-family:inherit; font-size:13px;
      color:var(--text); outline:none; cursor:pointer;
    }

    /* Contacts */
    .contact-card { background:var(--glass); border:1.5px solid var(--glass-border); backdrop-filter:blur(20px); border-radius:16px; overflow:hidden; margin-bottom:8px; }
    .contact-row { display:flex; align-items:center; gap:12px; padding:12px 16px; }
    .contact-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:600; color:#fff; flex-shrink:0; }
    .contact-info { flex:1; }
    .contact-name { font-size:14px; font-weight:500; }
    .contact-detail { font-size:12px; color:var(--muted); }
    .contact-delete { width:32px; height:32px; border-radius:50%; background:rgba(224,85,85,0.1); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; -webkit-tap-highlight-color:transparent; }
    .contact-delete:active { opacity:0.7; }

    /* Add contact form */
    .add-contact-form { background:var(--glass); border:1.5px solid var(--glass-border); backdrop-filter:blur(20px); border-radius:16px; padding:16px; margin-bottom:10px; display:none; }
    .add-contact-form.visible { display:block; }
    .form-input {
      width:100%; padding:11px 14px; border-radius:12px;
      border:1.5px solid var(--glass-border); background:rgba(255,255,255,0.5);
      font-family:inherit; font-size:14px; color:var(--text); outline:none;
      margin-bottom:8px; transition:border-color 0.2s;
    }
    .form-input:focus { border-color:var(--accent); }
    .form-input::placeholder { color:var(--muted); }
    .form-btns { display:flex; gap:8px; margin-top:4px; }
    .btn-save { flex:1; padding:11px; border-radius:12px; border:none; background:var(--accent); color:#fff; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; }
    .btn-cancel-form { padding:11px 16px; border-radius:12px; border:none; background:rgba(0,0,0,0.06); color:var(--muted); font-family:inherit; font-size:14px; cursor:pointer; }

    .btn-add-contact {
      width:100%; padding:13px; border-radius:14px; border:1.5px dashed rgba(74,127,212,0.4);
      background:rgba(74,127,212,0.05); color:var(--accent);
      font-family:inherit; font-size:14px; font-weight:500; cursor:pointer;
      -webkit-tap-highlight-color:transparent; transition:background 0.15s;
    }
    .btn-add-contact:active { background:rgba(74,127,212,0.1); }

    /* Change profile */
    .btn-danger {
      width:100%; padding:13px; border-radius:14px; border:none;
      background:rgba(224,85,85,0.08); color:var(--danger);
      font-family:inherit; font-size:14px; font-weight:500; cursor:pointer;
      margin-top:8px;
    }
    .btn-danger:active { opacity:0.7; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .contact-card { animation:fadeUp 0.25s ease both; }
  </style>
</head>
<body>
<div id="bg"></div>
<div class="app">
  <header>
    <span class="logo-text">Ponk <span>Note</span></span>
    <div class="btn-back" onclick="window.location.href='/library.html'">← Retour</div>
  </header>

  <div class="content">

    <div class="section-title">Préférences</div>
    <div class="pref-card">
      <div class="pref-row">
        <div class="pref-label-wrap"><span class="pref-icon">📬</span><span class="pref-name">Client mail</span></div>
        <select class="pref-select" id="prefMail" onchange="savePref('ponk_pref_mail', this.value)">
          <option value="gmail">Gmail</option>
          <option value="outlook">Outlook</option>
          <option value="yahoo">Yahoo</option>
          <option value="default">Autre</option>
        </select>
      </div>
      <div class="pref-row">
        <div class="pref-label-wrap"><span class="pref-icon">📅</span><span class="pref-name">Calendrier</span></div>
        <select class="pref-select" id="prefCal" onchange="savePref('ponk_pref_cal', this.value)">
          <option value="google">Google</option>
          <option value="outlook">Outlook</option>
          <option value="apple">Apple</option>
        </select>
      </div>
      <div class="pref-row">
        <div class="pref-label-wrap"><span class="pref-icon">🗺️</span><span class="pref-name">Navigation</span></div>
        <select class="pref-select" id="prefMaps" onchange="savePref('ponk_pref_maps', this.value)">
          <option value="google">Google Maps</option>
          <option value="waze">Waze</option>
          <option value="apple">Apple Maps</option>
        </select>
      </div>
    </div>

    <div class="section-title">Carnet de contacts</div>

    <div class="add-contact-form" id="addContactForm">
      <input class="form-input" id="contactName" placeholder="Prénom et nom" autocomplete="off" />
      <input class="form-input" id="contactEmail" placeholder="Email" type="email" autocomplete="off" />
      <input class="form-input" id="contactPhone" placeholder="Téléphone (+33...)" type="tel" autocomplete="off" />
      <div class="form-btns">
        <button class="btn-cancel-form" onclick="toggleAddForm()">Annuler</button>
        <button class="btn-save" onclick="saveContact()">Enregistrer</button>
      </div>
    </div>

    <div id="contactsList"></div>

    <button class="btn-add-contact" id="btnAddContact" onclick="toggleAddForm()">+ Ajouter un contact</button>

    <div class="section-title">Compte</div>
    <button class="btn-danger" onclick="changeProfile()">Changer de profil</button>

  </div>
</div>

<script>
  const COLORS = ['#4a7fd4','#e05555','#3db87a','#e07a30','#8a55d4','#d45580','#30a8d4'];
  function getColor(name) {
    let h=0; for(let i=0;i<name.length;i++) h=name.charCodeAt(i)+((h<<5)-h);
    return COLORS[Math.abs(h)%COLORS.length];
  }

  // Load prefs
  function loadPrefs() {
    ['prefMail','prefCal','prefMaps'].forEach(id => {
      const key = 'ponk_pref_' + id.replace('pref','').toLowerCase();
      const val = localStorage.getItem(key);
      if (val) document.getElementById(id).value = val;
    });
  }

  function savePref(key, value) {
    localStorage.setItem(key, value);
  }

  // Contacts
  function getContacts() {
    try { return JSON.parse(localStorage.getItem('ponk_contacts') || '[]'); } catch(e) { return []; }
  }
  function saveContacts(contacts) {
    localStorage.setItem('ponk_contacts', JSON.stringify(contacts));
  }

  function renderContacts() {
    const contacts = getContacts();
    const list = document.getElementById('contactsList');
    list.innerHTML = contacts.map((c, i) => `
      <div class="contact-card" style="animation-delay:${i*50}ms">
        <div class="contact-row">
          <div class="contact-avatar" style="background:${getColor(c.name)}">${c.name[0].toUpperCase()}</div>
          <div class="contact-info">
            <div class="contact-name">${c.name}</div>
            <div class="contact-detail">${[c.email, c.phone].filter(Boolean).join(' · ')}</div>
          </div>
          <button class="contact-delete" onclick="deleteContact(${i})">×</button>
        </div>
      </div>
    `).join('');
  }

  function toggleAddForm() {
    const form = document.getElementById('addContactForm');
    const btn = document.getElementById('btnAddContact');
    const visible = form.classList.toggle('visible');
    btn.textContent = visible ? '− Annuler' : '+ Ajouter un contact';
    if (visible) document.getElementById('contactName').focus();
    else { document.getElementById('contactName').value = ''; document.getElementById('contactEmail').value = ''; document.getElementById('contactPhone').value = ''; }
  }

  function saveContact() {
    const name  = document.getElementById('contactName').value.trim();
    const email = document.getElementById('contactEmail').value.trim();
    const phone = document.getElementById('contactPhone').value.trim();
    if (!name) { document.getElementById('contactName').focus(); return; }
    const contacts = getContacts();
    contacts.push({ name, email, phone });
    saveContacts(contacts);
    renderContacts();
    toggleAddForm();
  }

  function deleteContact(index) {
    if (!confirm('Supprimer ce contact ?')) return;
    const contacts = getContacts();
    contacts.splice(index, 1);
    saveContacts(contacts);
    renderContacts();
  }

  function changeProfile() {
    if (confirm('Changer de profil ?')) {
      localStorage.removeItem('ponk_profile');
      localStorage.removeItem('ponk_email');
      window.location.href = '/';
    }
  }

  loadPrefs();
  renderContacts();
</script>
</body>
</html>
