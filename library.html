<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ponk Note — Bibliothèque</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
    :root {
      --grad: linear-gradient(145deg, #d8d0f8 0%, #e8d0f0 40%, #d8e8f8 100%);
      --glass: rgba(255,255,255,0.45);
      --glass-border: rgba(255,255,255,0.7);
      --text: #2a2a3a;
      --muted: rgba(42,42,58,0.5);
      --accent: #4a7fd4;
      --danger: #e05555;
      --green: #3db87a;
      --wave: rgba(224,85,85,0.7);
    }
    html, body { min-height:100%; font-family:'Inter',-apple-system,sans-serif; color:var(--text); }
    body { padding-bottom:60px; }
    body::before { content:''; position:fixed; inset:0; z-index:-1; background:var(--grad); }

    header {
      position:sticky; top:0; z-index:10;
      backdrop-filter:blur(24px) saturate(180%);
      background:rgba(216,208,248,0.7);
      border-bottom:1px solid var(--glass-border);
      padding:env(safe-area-inset-top,0px) 20px 0;
    }
    .header-inner { display:flex; align-items:center; justify-content:space-between; padding:14px 0; max-width:430px; margin:0 auto; }
    .logo { font-size:17px; font-weight:700; letter-spacing:-0.3px; }
    .logo span { color:var(--muted); font-weight:400; }
    .back-btn { background:var(--glass); border:1.5px solid var(--glass-border); backdrop-filter:blur(12px); color:var(--accent); padding:6px 14px; border-radius:100px; font-family:inherit; font-size:13px; font-weight:500; cursor:pointer; }
    .back-btn:active { background:rgba(255,255,255,0.7); }
    .header-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; color:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.15); }

    .content { max-width:430px; margin:0 auto; padding:20px 20px 0; }

    /* Profile */
    .profile-info { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
    .profile-avatar-lg { width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:600; color:#fff; box-shadow:0 4px 16px rgba(0,0,0,0.15); flex-shrink:0; }
    .profile-name { font-size:18px; font-weight:600; letter-spacing:-0.3px; }
    .profile-email { font-size:13px; color:var(--muted); margin-top:2px; }

    /* Quota */
    .quota-wrap { background:var(--glass); border:1.5px solid var(--glass-border); backdrop-filter:blur(20px); border-radius:16px; padding:16px; margin-bottom:20px; }
    .quota-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .quota-label { font-size:13px; font-weight:500; }
    .quota-count { font-size:13px; color:var(--muted); }
    .quota-dots { display:flex; gap:6px; }
    .quota-dot { width:32px; height:5px; border-radius:3px; background:rgba(255,255,255,0.3); transition:background 0.3s; }
    .quota-dot.filled { background:var(--accent); }
    .quota-dot.filled.danger { background:var(--danger); }

    .section-title { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:10px; padding:0 4px; }

    /* Card */
    .card { background:var(--glass); border:1.5px solid var(--glass-border); backdrop-filter:blur(20px); border-radius:18px; margin-bottom:10px; overflow:hidden; }
    .card-main { padding:14px 16px 12px; }
    .card-title { font-size:15px; font-weight:500; letter-spacing:-0.2px; margin-bottom:3px; }
    .card-meta { font-size:12px; color:var(--muted); margin-bottom:12px; }

    /* Player */
    .player { display:flex; align-items:center; gap:10px; cursor:pointer; }
    .play-btn-sm { width:34px; height:34px; border-radius:50%; background:var(--text); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; -webkit-tap-highlight-color:transparent; transition:transform 0.1s; }
    .play-btn-sm:active { transform:scale(0.92); }
    .play-btn-sm svg { fill:white; }
    .waveform { flex:1; height:36px; display:flex; align-items:center; gap:2px; cursor:pointer; }
    .wave-bar { flex:1; border-radius:2px; background:var(--wave); opacity:0.4; min-height:3px; }

    /* Actions */
    .card-actions { display:none; padding:0 16px 14px; gap:8px; animation:slideDown 0.2s ease; }
    .card-actions.visible { display:flex; }
    @keyframes slideDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

    .btn-analyze { flex:1; padding:11px; border-radius:10px; border:none; background:var(--accent); color:#fff; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; -webkit-tap-highlight-color:transparent; }
    .btn-analyze:active { opacity:0.8; }
    .btn-analyze.analyzed { background:var(--green); }
    .btn-delete { width:42px; padding:11px; border-radius:10px; border:none; background:rgba(224,85,85,0.15); color:var(--danger); font-family:inherit; font-size:16px; cursor:pointer; }
    .btn-delete:active { background:rgba(224,85,85,0.25); }

    /* Empty */
    .empty { text-align:center; padding:60px 20px; color:var(--muted); }
    .empty-icon { font-size:48px; margin-bottom:16px; }
    .empty p { font-size:15px; line-height:1.6; }

    .change-profile { margin-top:32px; text-align:center; }
    .change-profile button { background:none; border:none; color:var(--muted); font-family:inherit; font-size:14px; cursor:pointer; padding:8px 16px; }

    .loading { text-align:center; padding:40px; color:var(--muted); font-size:14px; }

    .spinner-sm { width:16px; height:16px; flex-shrink:0; }
    .spinner-sm svg { animation:spin 1s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .spinner-arc-sm { fill:none; stroke:#fff; stroke-width:3; stroke-linecap:round; stroke-dasharray:32 64; animation:arc-sm 1s linear infinite; }
    @keyframes arc-sm { 0%{stroke-dashoffset:0} 50%{stroke-dashoffset:-22} 100%{stroke-dashoffset:-64} }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <span class="logo">Ponk <span>Note</span></span>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="back-btn" onclick="window.location.href='/'">← Retour</button>
      <div class="header-avatar" id="headerAvatar"></div>
    </div>
  </div>
</header>

<div class="content">
  <div class="profile-info">
    <div class="profile-avatar-lg" id="profileAvatarLg"></div>
    <div>
      <div class="profile-name" id="profileName">—</div>
      <div class="profile-email" id="profileEmail">—</div>
    </div>
  </div>

  <div class="quota-wrap">
    <div class="quota-header">
      <span class="quota-label">Enregistrements</span>
      <span class="quota-count" id="quotaCount">0/5</span>
    </div>
    <div class="quota-dots" id="quotaDots">
      <div class="quota-dot"></div><div class="quota-dot"></div><div class="quota-dot"></div>
      <div class="quota-dot"></div><div class="quota-dot"></div>
    </div>
  </div>

  <div class="section-title">En attente</div>
  <div id="recordingsList"><div class="loading">Chargement…</div></div>

  <div class="change-profile">
    <button onclick="changeProfile()">Changer de profil</button>
  </div>
</div>

<script>
const COLORS = ['#4a7fd4','#e05555','#3db87a','#e07a30','#8a55d4','#d45580','#30a8d4','#50c87a'];
const MAX = 5;

function getColor(name) {
  let hash=0; for(let i=0;i<name.length;i++) hash=name.charCodeAt(i)+((hash<<5)-hash);
  return COLORS[Math.abs(hash)%COLORS.length];
}

const profile = localStorage.getItem('ponk_profile');
const email   = localStorage.getItem('ponk_email');
const uid     = localStorage.getItem('ponk_profile');
if (!profile) { window.location.href='/'; }

const color = getColor(profile);
['headerAvatar','profileAvatarLg'].forEach(id => {
  const el = document.getElementById(id);
  el.textContent = profile[0].toUpperCase();
  el.style.background = color;
});
document.getElementById('profileName').textContent = profile;
document.getElementById('profileEmail').textContent = email || '';

loadRecordings();

async function loadRecordings() {
  try {
    const res = await fetch(`/api/list?uid=${encodeURIComponent(uid||profile)}`);
    const data = await res.json();
    const files = (data.files||[]).filter(f=>f.name&&f.name!=='.emptyFolderPlaceholder');
    updateQuota(files.length);
    renderList(files);
  } catch(e) {
    document.getElementById('recordingsList').innerHTML = '<div class="loading">Erreur de chargement</div>';
  }
}

function updateQuota(count) {
  document.getElementById('quotaCount').textContent = `${count}/${MAX}`;
  document.querySelectorAll('.quota-dot').forEach((dot,i) => {
    dot.classList.toggle('filled', i<count);
    dot.classList.toggle('danger', i<count && count===MAX);
  });
}

function renderList(files) {
  const container = document.getElementById('recordingsList');
  if (!files.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🎙</div><p>Aucun enregistrement<br>en attente d'analyse</p></div>`;
    return;
  }
  container.innerHTML = '';
  files.forEach(file => container.appendChild(makeCard(file)));
}

function makeCard(file) {
  const card = document.createElement('div');
  card.className = 'card';
  const nameParts = file.name.replace('.webm','').split('-');
  const title = nameParts.slice(3).join(' ') || 'Enregistrement';
  const dateDisplay = formatDate(file.created_at);
  const analyzed = localStorage.getItem(`ponk_analyzed_${file.name}`);
  const bars = Array.from({length:40}, ()=>`<div class="wave-bar" style="height:${Math.random()*80+20}%"></div>`).join('');

  card.innerHTML = `
    <div class="card-main">
      <div class="card-title">${title}</div>
      <div class="card-meta">${dateDisplay}</div>
      <div class="player" onclick="toggleActions(this.closest('.card'))">
        <button class="play-btn-sm" id="play_${file.name}" onclick="toggleAudio('${file.name}',event)">
          <svg viewBox="0 0 24 24" width="14" height="14"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="waveform">${bars}</div>
      </div>
    </div>
    <div class="card-actions" id="actions_${file.name}">
      <button class="btn-analyze ${analyzed?'analyzed':''}" onclick="handleAnalyze('${file.name}',this)">
        ${analyzed ? '✓ Voir l\'analyse' : 'Analyser'}
      </button>
      <button class="btn-delete" onclick="handleDelete('${file.name}',this)">🗑</button>
    </div>`;
  return card;
}

function toggleActions(card) { card.querySelector('.card-actions').classList.toggle('visible'); }

const audioPlayers = {};
async function toggleAudio(fileName, e) {
  e.stopPropagation();
  const btn = document.getElementById(`play_${fileName}`);
  if (audioPlayers[fileName]) {
    const a = audioPlayers[fileName];
    if (a.paused) { a.play(); btn.innerHTML='<svg viewBox="0 0 24 24" width="14" height="14"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>'; }
    else { a.pause(); btn.innerHTML='<svg viewBox="0 0 24 24" width="14" height="14"><path d="M8 5v14l11-7z"/></svg>'; }
    return;
  }
  const url = `https://nnppmsomwigihidjpwnp.supabase.co/storage/v1/object/public/audio/${uid||profile}/${fileName}`;
  const audio = new Audio(url);
  audioPlayers[fileName] = audio;
  audio.onended = () => btn.innerHTML='<svg viewBox="0 0 24 24" width="14" height="14"><path d="M8 5v14l11-7z"/></svg>';
  audio.play();
  btn.innerHTML='<svg viewBox="0 0 24 24" width="14" height="14"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
}

async function handleAnalyze(fileName, btn) {
  const analyzed = localStorage.getItem(`ponk_analyzed_${fileName}`);
  if (analyzed) { localStorage.setItem('ponk_result',analyzed); window.location.href='/results.html'; return; }
  btn.disabled = true;
  btn.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;gap:8px"><div class="spinner-sm"><svg viewBox="0 0 24 24" width="16" height="16"><circle class="spinner-arc-sm" cx="12" cy="12" r="9"/></svg></div><span>Analyse en cours…</span></div>';
  try {
    const url = `https://nnppmsomwigihidjpwnp.supabase.co/storage/v1/object/public/audio/${uid||profile}/${fileName}`;
    const audioRes = await fetch(url);
    if (!audioRes.ok) throw new Error('Audio introuvable');
    const audioBlob = await audioRes.blob();
    const parts = fileName.replace('.webm','').split('-');
    const title = parts.slice(6).join(' ')||'';
    const datetime = parts.slice(0,6).join('-');
    const formData = new FormData();
    formData.append('audio',audioBlob,fileName);
    formData.append('title',title);
    formData.append('duration','');
    formData.append('datetime',datetime);
    const res = await fetch('/api/analyze',{method:'POST',body:formData});
    if (!res.ok) throw new Error('Erreur analyse');
    const data = await res.json();
    localStorage.setItem('ponk_result',JSON.stringify(data));
    localStorage.setItem('ponk_meta',JSON.stringify({title,datetime}));
    localStorage.setItem(`ponk_analyzed_${fileName}`,JSON.stringify(data));
    window.location.href = '/results.html';
  } catch(e) { btn.disabled=false; btn.innerHTML='Analyser'; alert('Erreur : '+e.message); }
}

async function handleDelete(fileName, btn) {
  if (!confirm('Supprimer cet enregistrement ?')) return;
  btn.disabled = true;
  try {
    const res = await fetch('/api/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:`${uid||profile}/${fileName}`})});
    if (!res.ok) throw new Error('Erreur suppression');
    localStorage.removeItem(`ponk_analyzed_${fileName}`);
    loadRecordings();
  } catch(e) { btn.disabled=false; alert('Erreur : '+e.message); }
}

function formatDate(str) {
  if (!str) return '';
  try { return new Date(str).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}); }
  catch { return str; }
}

function changeProfile() {
  if (confirm('Changer de profil ?')) {
    localStorage.removeItem('ponk_profile');
    localStorage.removeItem('ponk_email');
    window.location.href = '/';
  }
}
</script>
</body>
</html>
