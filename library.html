<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ponk Note — Bibliothèque</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
    :root {
      --bg-deep:   #050c1a;
      --bg-mid:    #080f20;
      --bg-card:   rgba(0,212,255,0.04);
      --bg-card2:  rgba(0,212,255,0.08);
      --cyan:      #00d4ff;
      --cyan-dim:  rgba(0,212,255,0.55);
      --cyan-glow: rgba(0,212,255,0.18);
      --cyan-border: rgba(0,212,255,0.3);
      --cyan-border-hi: rgba(0,212,255,0.6);
      --text:      #e8f4ff;
      --muted:     rgba(180,220,255,0.45);
      --danger:    #ff4466;
      --green:     #00e5a0;
      --font-display: 'Orbitron', sans-serif;
      --font-body:    'Exo 2', sans-serif;
    }

    html, body { min-height:100%; font-family:var(--font-body); color:var(--text); background:var(--bg-deep); }
    body { padding-bottom:60px; overflow-x:hidden; }

    /* Stars */
    body::before {
      content:'';
      position:fixed; inset:0; z-index:0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 30%, rgba(0,80,140,0.35) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 70%, rgba(0,50,100,0.25) 0%, transparent 70%),
        var(--bg-deep);
    }
    .stars {
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(0,212,255,0.6) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 60%, rgba(0,212,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 25%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 75%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 85%, rgba(0,212,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 90% 45%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 90%, rgba(0,212,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 78% 12%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 50%, rgba(0,212,255,0.4) 0%, transparent 100%);
    }

    /* Header */
    header {
      position:sticky; top:0; z-index:10;
      background:rgba(5,12,26,0.85);
      backdrop-filter:blur(20px);
      border-bottom:1px solid var(--cyan-border);
      padding:env(safe-area-inset-top,0px) 20px 0;
    }
    .header-inner { display:flex; align-items:center; justify-content:space-between; padding:14px 0; max-width:430px; margin:0 auto; }
    .logo {
      font-family:var(--font-display);
      font-size:16px; font-weight:700; letter-spacing:1px;
      color:var(--text);
    }
    .logo span { color:var(--cyan); }

    .back-btn {
      background:transparent;
      border:1px solid var(--cyan-border);
      color:var(--cyan);
      padding:6px 14px;
      border-radius:6px;
      font-family:var(--font-display);
      font-size:11px;
      font-weight:600;
      letter-spacing:0.5px;
      cursor:pointer;
      transition:background 0.2s, border-color 0.2s;
    }
    .back-btn:hover, .back-btn:active { background:var(--cyan-glow); border-color:var(--cyan-border-hi); }

    .header-avatar {
      width:32px; height:32px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-display); font-size:12px; font-weight:700;
      color:var(--bg-deep);
      border:1.5px solid var(--cyan);
      box-shadow:0 0 8px var(--cyan-dim);
    }

    /* Content */
    .content { position:relative; z-index:1; max-width:430px; margin:0 auto; padding:20px 20px 0; }

    /* Profile */
    .profile-info { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
    .profile-avatar-lg {
      width:52px; height:52px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-display); font-size:20px; font-weight:700;
      color:var(--bg-deep);
      border:2px solid var(--cyan);
      box-shadow:0 0 16px var(--cyan-dim), inset 0 0 8px rgba(0,212,255,0.1);
    }
    .profile-name { font-family:var(--font-display); font-size:15px; font-weight:600; letter-spacing:0.5px; color:var(--text); }
    .profile-email { font-family:var(--font-body); font-size:13px; color:var(--muted); margin-top:2px; }

    /* Quota */
    .quota-wrap {
      background:var(--bg-card);
      border:1px solid var(--cyan-border);
      border-radius:10px;
      padding:16px;
      margin-bottom:20px;
    }
    .quota-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .quota-label { font-family:var(--font-display); font-size:10px; font-weight:600; letter-spacing:1.5px; color:var(--cyan); text-transform:uppercase; }
    .quota-count { font-family:var(--font-display); font-size:11px; color:var(--muted); letter-spacing:1px; }
    .quota-dots { display:flex; gap:6px; }
    .quota-dot { width:32px; height:4px; border-radius:2px; background:rgba(0,212,255,0.12); border:1px solid rgba(0,212,255,0.15); transition:all 0.3s; }
    .quota-dot.filled { background:var(--cyan); box-shadow:0 0 6px var(--cyan-dim); border-color:var(--cyan); }
    .quota-dot.filled.danger { background:var(--danger); box-shadow:0 0 6px rgba(255,68,102,0.6); border-color:var(--danger); }

    /* Section title */
    .section-title {
      font-family:var(--font-display);
      font-size:9px; font-weight:700;
      color:var(--cyan-dim);
      text-transform:uppercase; letter-spacing:2px;
      margin-bottom:10px; padding:0 4px;
    }

    /* Cards */
    .card {
      background:var(--bg-card);
      border:1px solid var(--cyan-border);
      border-radius:12px;
      margin-bottom:10px;
      overflow:hidden;
      transition:border-color 0.2s, background 0.2s;
    }
    .card:hover { border-color:var(--cyan-border-hi); background:var(--bg-card2); }

    .card-main { padding:14px 16px 12px; }
    .card-title { font-family:var(--font-display); font-size:13px; font-weight:600; letter-spacing:0.3px; margin-bottom:3px; color:var(--text); }
    .card-meta { font-family:var(--font-body); font-size:12px; color:var(--muted); margin-bottom:12px; }

    .player { display:flex; align-items:center; gap:10px; cursor:pointer; }
    .play-btn-sm {
      width:34px; height:34px; border-radius:50%;
      background:transparent;
      border:1.5px solid var(--cyan);
      cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
      box-shadow:0 0 8px var(--cyan-glow);
      transition:background 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color:transparent;
    }
    .play-btn-sm:active, .play-btn-sm:hover { background:var(--cyan-glow); box-shadow:0 0 14px var(--cyan-dim); }
    .play-btn-sm svg { fill:var(--cyan); }

    .waveform { flex:1; height:40px; display:flex; align-items:center; gap:1.5px; cursor:pointer; }
    .wave-bar {
      flex:1; border-radius:2px; min-height:3px;
      background:linear-gradient(180deg, var(--cyan) 0%, rgba(0,212,255,0.2) 100%);
      transition:opacity 0.15s;
    }

    /* Card actions */
    .card-actions { display:none; padding:0 16px 14px; gap:8px; animation:slideDown 0.2s ease; }
    .card-actions.visible { display:flex; }
    @keyframes slideDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

    .btn-analyze {
      flex:1; padding:11px; border-radius:8px;
      border:1px solid var(--cyan);
      background:transparent;
      color:var(--cyan);
      font-family:var(--font-display); font-size:11px; font-weight:600;
      letter-spacing:1px; text-transform:uppercase;
      cursor:pointer;
      transition:background 0.2s, box-shadow 0.2s;
    }
    .btn-analyze:hover { background:var(--cyan-glow); box-shadow:0 0 12px var(--cyan-glow); }
    .btn-analyze:active { opacity:0.7; }
    .btn-analyze.analyzed {
      border-color:var(--green);
      color:var(--green);
      box-shadow:0 0 8px rgba(0,229,160,0.2);
    }
    .btn-delete {
      width:42px; padding:11px; border-radius:8px;
      border:1px solid rgba(255,68,102,0.35);
      background:transparent;
      color:var(--danger);
      font-family:inherit; font-size:15px; cursor:pointer;
      transition:background 0.2s;
    }
    .btn-delete:hover { background:rgba(255,68,102,0.1); }

    /* Empty */
    .empty { text-align:center; padding:60px 20px; color:var(--muted); }
    .empty-icon { font-size:40px; margin-bottom:16px; }
    .empty p { font-family:var(--font-body); font-size:15px; line-height:1.6; }

    /* Bottom links */
    .change-profile { margin-top:32px; text-align:center; }
    .change-profile button {
      background:none; border:none;
      font-family:var(--font-display); font-size:11px;
      letter-spacing:0.8px;
      cursor:pointer; padding:8px 16px;
    }
    .btn-settings { color:var(--cyan) !important; display:block; width:100%; margin-bottom:8px; }
    .btn-change { color:var(--muted) !important; }
    .btn-settings:hover { text-shadow:0 0 8px var(--cyan-dim); }

    /* Loading */
    .loading { text-align:center; padding:40px; color:var(--muted); font-family:var(--font-display); font-size:11px; letter-spacing:1px; }

    /* Animations */
    @keyframes cardIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .card { animation: cardIn 0.35s ease both; }

    /* Spinner */
    .spinner-sm { width:16px; height:16px; flex-shrink:0; }
    .spinner-sm svg { animation:spin 1s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .spinner-arc-sm { fill:none; stroke:var(--cyan); stroke-width:3; stroke-linecap:round; stroke-dasharray:32 64; animation:arc-sm 1s linear infinite; }
    @keyframes arc-sm { 0%{stroke-dashoffset:0} 50%{stroke-dashoffset:-22} 100%{stroke-dashoffset:-64} }

    /* Scan line subtlety */
    @keyframes scanline {
      0%   { transform:translateY(-100%); opacity:0.03; }
      100% { transform:translateY(100vh); opacity:0.03; }
    }
    .scanline {
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background:linear-gradient(transparent 50%, rgba(0,212,255,0.03) 50%);
      background-size:100% 4px;
      animation:scanline 8s linear infinite;
    }
  </style>
</head>
<body>
<div class="stars"></div>
<div class="scanline"></div>

<header>
  <div class="header-inner">
    <span class="logo">Ponk <span>Note</span></span>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="back-btn" onclick="window.location.href='/'">← Retour</button>
      <div class="header-avatar" id="headerAvatar"></div>
    </div>
  </div>
</header>

<div class="content">
  <div class="profile-info">
    <div class="profile-avatar-lg" id="profileAvatarLg"></div>
    <div>
      <div class="profile-name" id="profileName">—</div>
      <div class="profile-email" id="profileEmail">—</div>
    </div>
  </div>

  <div class="quota-wrap">
    <div class="quota-header">
      <span class="quota-label">Enregistrements</span>
      <span class="quota-count" id="quotaCount">0/5</span>
    </div>
    <div class="quota-dots" id="quotaDots">
      <div class="quota-dot"></div><div class="quota-dot"></div><div class="quota-dot"></div>
      <div class="quota-dot"></div><div class="quota-dot"></div>
    </div>
  </div>

  <div class="section-title">En attente</div>
  <div id="recordingsList"><div class="loading">Chargement…</div></div>

  <div class="change-profile">
    <button class="btn-settings" onclick="window.location.href='/settings.html'">⚙ Paramètres</button>
    <button class="btn-change" onclick="changeProfile()">Changer de profil</button>
  </div>
</div>

<script>
const COLORS_BG = ['#00d4ff'];
const MAX = 5;

const profile = localStorage.getItem('ponk_profile');
const email   = localStorage.getItem('ponk_email');
const uid     = localStorage.getItem('ponk_profile');
if (!profile) { window.location.href='/'; }

['headerAvatar','profileAvatarLg'].forEach(id => {
  const el = document.getElementById(id);
  el.textContent = profile[0].toUpperCase();
  el.style.background = 'var(--cyan)';
});
document.getElementById('profileName').textContent = profile;
document.getElementById('profileEmail').textContent = email || '';

loadRecordings();

async function loadRecordings() {
  try {
    const res = await fetch(`/api/list?uid=${encodeURIComponent(uid||profile)}`);
    const data = await res.json();
    const files = (data.files||[]).filter(f=>f.name&&f.name!=='.emptyFolderPlaceholder');
    updateQuota(files.length);
    renderList(files);
  } catch(e) {
    document.getElementById('recordingsList').innerHTML = '<div class="loading">Erreur de chargement</div>';
  }
}

function updateQuota(count) {
  document.getElementById('quotaCount').textContent = `${count}/${MAX}`;
  document.querySelectorAll('.quota-dot').forEach((dot,i) => {
    dot.classList.toggle('filled', i<count);
    dot.classList.toggle('danger', i<count && count===MAX);
  });
}

function renderList(files) {
  const container = document.getElementById('recordingsList');
  if (!files.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🎙</div><p>Aucun enregistrement<br>en attente d'analyse</p></div>`;
    return;
  }
  container.innerHTML = '';
  files.forEach((file, i) => container.appendChild(makeCard(file, i)));
}

function makeCard(file, index) {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.animationDelay = `${index * 80}ms`;

  const nameParts = file.name.replace('.webm','').split('-');
  let timeStr = '';
  let titleStr = 'Enregistrement';
  try {
    const joined = nameParts.join('-');
    const timeMatch = joined.match(/T(\d{2})-(\d{2})-(\d{2})/);
    if (timeMatch) timeStr = timeMatch[1] + 'h' + timeMatch[2];
    const afterT = joined.split(/T\d{2}-\d{2}-\d{2}-?/)[1];
    if (afterT && afterT.trim()) titleStr = afterT.replace(/-/g,' ').trim();
  } catch(e) {}

  const displayTitle = titleStr !== 'enregistrement' && titleStr
    ? titleStr.charAt(0).toUpperCase() + titleStr.slice(1)
    : timeStr ? 'Enregistrement · ' + timeStr : 'Enregistrement';

  const dateDisplay = formatDate(file.created_at);
  const duration = file.metadata?.size ? formatSize(file.metadata.size) : '';
  const analyzed = localStorage.getItem(`ponk_analyzed_${file.name}`);

  const bars = Array.from({length:40}, (_,i) => {
    const center = 20;
    const dist = Math.abs(i - center) / center;
    const base = Math.max(15, 90 * (1 - dist * dist * 0.7));
    const h = base * (0.5 + Math.random() * 0.6);
    const opacity = 0.2 + (1 - dist) * 0.6;
    return `<div class="wave-bar" style="height:${h}%;opacity:${opacity.toFixed(2)}"></div>`;
  }).join('');

  card.innerHTML = `
    <div class="card-main">
      <div class="card-title">${displayTitle}</div>
      <div class="card-meta">${dateDisplay}${duration ? ' · ' + duration : ''}</div>
      <div class="player" onclick="toggleActions(this.closest('.card'))">
        <button class="play-btn-sm" id="play_${file.name}" onclick="toggleAudio('${file.name}',event)">
          <svg viewBox="0 0 24 24" width="12" height="12"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="waveform">${bars}</div>
      </div>
    </div>
    <div class="card-actions" id="actions_${file.name}">
      <button class="btn-analyze ${analyzed?'analyzed':''}" onclick="handleAnalyze('${file.name}',this)">
        ${analyzed ? '✓ Voir l\'analyse' : 'Analyser'}
      </button>
      <button class="btn-delete" onclick="handleDelete('${file.name}',this)">🗑</button>
    </div>`;
  return card;
}

function toggleActions(card) { card.querySelector('.card-actions').classList.toggle('visible'); }

const audioPlayers = {};
async function toggleAudio(fileName, e) {
  e.stopPropagation();
  const btn = document.getElementById(`play_${fileName}`);
  if (audioPlayers[fileName]) {
    const a = audioPlayers[fileName];
    if (a.paused) { a.play(); btn.innerHTML='<svg viewBox="0 0 24 24" width="12" height="12" fill="var(--cyan)"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>'; }
    else { a.pause(); btn.innerHTML='<svg viewBox="0 0 24 24" width="12" height="12" fill="var(--cyan)"><path d="M8 5v14l11-7z"/></svg>'; }
    return;
  }
  const url = `${window.location.origin}/api/audio-proxy?path=${encodeURIComponent((uid||profile) + '/' + fileName)}`;
  const audio = new Audio(url);
  audioPlayers[fileName] = audio;
  audio.onended = () => btn.innerHTML='<svg viewBox="0 0 24 24" width="12" height="12" fill="var(--cyan)"><path d="M8 5v14l11-7z"/></svg>';
  audio.play();
  btn.innerHTML='<svg viewBox="0 0 24 24" width="12" height="12" fill="var(--cyan)"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
}

async function handleAnalyze(fileName, btn) {
  const analyzed = localStorage.getItem(`ponk_analyzed_${fileName}`);
  if (analyzed) {
    localStorage.setItem('ponk_result', analyzed);
    window.location.href = '/results.html';
    return;
  }
  btn.disabled = true;
  btn.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;gap:8px"><div class="spinner-sm"><svg viewBox="0 0 24 24" width="16" height="16"><circle class="spinner-arc-sm" cx="12" cy="12" r="9"/></svg></div><span>Analyse…</span></div>';
  try {
    const fullFileName = `${uid||profile}/${fileName}`;
    const parts = fileName.replace('.webm','').split('-');
    const title = parts.slice(6).join(' ')||'enregistrement';
    const datetime = parts.slice(0,6).join('-');
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ fileName: fullFileName, title, duration: '', datetime, profile: uid||profile, bubbles: [] })
    });
    if (!res.ok) throw new Error('Erreur analyse ' + res.status);
    const data = await res.json();
    localStorage.setItem('ponk_result', JSON.stringify(data));
    localStorage.setItem('ponk_meta', JSON.stringify({title, datetime}));
    localStorage.setItem(`ponk_analyzed_${fileName}`, JSON.stringify(data));
    window.location.href = '/results.html';
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = 'Analyser';
    alert('Erreur : ' + e.message);
  }
}

async function handleDelete(fileName, btn) {
  if (!confirm('Supprimer cet enregistrement ?')) return;
  btn.disabled = true;
  try {
    const res = await fetch('/api/delete', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ path: `${uid||profile}/${fileName}` })
    });
    if (!res.ok) throw new Error('Erreur suppression');
    localStorage.removeItem(`ponk_analyzed_${fileName}`);
    loadRecordings();
  } catch(e) {
    btn.disabled = false;
    alert('Erreur : ' + e.message);
  }
}

function formatSize(bytes) {
  if (!bytes) return '';
  const kb = bytes / 1024;
  if (kb < 1024) return Math.round(kb) + ' Ko';
  return (kb / 1024).toFixed(1) + ' Mo';
}

function formatDate(str) {
  if (!str) return '';
  try { return new Date(str).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}); }
  catch { return str; }
}

function changeProfile() {
  if (confirm('Changer de profil ?')) {
    localStorage.removeItem('ponk_profile');
    localStorage.removeItem('ponk_email');
    window.location.href = '/';
  }
}
</script>
</body>
</html>
